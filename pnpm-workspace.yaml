autoInstallPeers: true
engineStrict: true
# Pin the Node version pnpm runs scripts with so environments that boot an
# older Node (e.g. the Claude Code web sandbox defaults to Node 22) don't trip
# the engineStrict gate — pnpm self-provisions this version. Keep in sync with
# .nvmrc / .node-version / engines.node (>=24).
useNodeVersion: 24.13.0

allowBuilds:
  # Telemetry package pulled in transitively; deny its postinstall build so a
  # strict install does not fail on an undecided build script (ERR_PNPM_IGNORED_BUILDS).
  '@scarf/scarf': false
  '@sentry/node-cpu-profiler': true
  argon2: true
  cpu-features: true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
  ssh2: true
  vue-demi: false

packageExtensions:
  openapi-to-postmanv2:
    dependencies:
      lodash: 4.17.24
      js-yaml: ^4.1.1
  postman-collection:
    dependencies:
      lodash: 4.17.24
  '@esbuild-kit/core-utils':
    dependencies:
      esbuild: ^0.25.0

overrides:
  # Hold Biome at 2.5.2 — 2.5.3 crashes `biome check` with an upstream panic in
  # the module-graph resolver (biome_module_graph module_resolver.rs:500:33).
  # Remove this pin once a fixed Biome (2.5.4+) is released.
  '@biomejs/biome': 2.5.2
  '@babel/core': '>=7.29.1'
  # body-parser <2.3.0 — GHSA-v422-hmwv-36x6 (low): DoS when an invalid limit
  # silently disables size enforcement (transitive via @modelcontextprotocol/sdk
  # > express). Fixed in 2.3.0.
  body-parser: '>=2.3.0'
  # Keep ioredis deduplicated against BullMQ, which pins an exact ioredis version in its
  # `dependencies` (currently 5.10.1). Two ioredis copies caused TS type errors in workers/queues
  # (docs/reviews/full-codebase-review-deliverables.md). Bump ONLY in lockstep with BullMQ's pin —
  # check `node_modules/bullmq/package.json` before raising this.
  ioredis: 5.10.1
  esbuild: '>=0.28.1'
  '@esbuild-kit/core-utils>esbuild': '>=0.28.1'
  lodash: '>=4.17.24'
  '@grpc/grpc-js': '>=1.14.4'
  # js-yaml 5.0.0–5.2.0 — GHSA-724g-mxrg-4qvm (moderate): quadratic-complexity
  # DoS via !!omap in YAML11_SCHEMA (transitive via markdownlint-cli2). Fixed in 5.2.1.
  js-yaml: '>=5.2.1'
  fast-xml-parser: '>=5.7.0'
  # hono <4.12.27 — GHSA-xgm2-5f3f-mvvc / GHSA-hvrm-45r6-mjfj / GHSA-w62v-xxxg-mg59
  # (moderate): API-gateway adapter dropping a distinct route, hono/jsx per-request
  # context disclosure, and server-side XSS via the cx() JSX escaping bypass.
  # Transitive via @modelcontextprotocol/sdk + @scalar/cli. Fixed in 4.12.27
  # (raised from the earlier 4.12.21 floor as these advisories were newly disclosed).
  hono: '>=4.12.27'
  # @hono/node-server <2.0.10 — GHSA-frvp-7c67-39w9 (path traversal, <2.0.5) and
  # GHSA-9mqv-5hh9-4cgg (unauthenticated memory-leak DoS via aborted WebSocket
  # handshake, <=2.0.9). Transitive via @modelcontextprotocol/sdk + @scalar/cli.
  # Fixed in 2.0.10.
  '@hono/node-server': '>=2.0.10'
  markdown-it: '>=14.1.1'
  minimatch: 10.2.5
  # brace-expansion <5.0.7 — CVE-2026-13149 (HIGH): ReDoS via exponential-time
  # complexity in expansion. Transitive (minimatch et al.); fixed in 5.0.7.
  brace-expansion: '>=5.0.7'
  micromatch>picomatch: 4.0.4
  rollup: '>=4.59.0'
  vite: '>=8.0.16 <9'
  fastify: '>=5.8.5'
  '@fastify/static': '>=9.1.1'
  # fast-uri <3.1.4 — GHSA-4c8g-83qw-93j6 / GHSA-v2hh-gcrm-f6hx (high): host
  # confusion via failed IDN parsing and via a literal-host bypass. Transitive via
  # fastify's ajv/find-my-way URI handling. Fixed in 3.1.4.
  fast-uri: '>=3.1.4'
  dompurify: '>=3.4.11'
  drizzle-orm: '>=0.45.2'
  i18next-fs-backend: '>=2.6.4'
  i18next-http-middleware: '>=3.9.3'
  qs: '>=6.15.2'
  tmp: '>=0.2.6'
  undici: '>=7.28.0 <8'
  uuid: '>=11.1.1'
  yaml@1.10.2: 1.10.3
