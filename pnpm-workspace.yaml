autoInstallPeers: true
engineStrict: true
# Pin the Node version pnpm runs scripts with so environments that boot an
# older Node (e.g. the Claude Code web sandbox defaults to Node 22) don't trip
# the engineStrict gate — pnpm self-provisions this version. Keep in sync with
# .nvmrc / .node-version / engines.node (>=24).
useNodeVersion: 24.13.0

allowBuilds:
  # Telemetry package pulled in transitively; deny its postinstall build so a
  # strict install does not fail on an undecided build script (ERR_PNPM_IGNORED_BUILDS).
  '@scarf/scarf': false
  '@sentry/node-cpu-profiler': true
  argon2: true
  cpu-features: true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
  ssh2: true
  vue-demi: false

packageExtensions:
  openapi-to-postmanv2:
    dependencies:
      lodash: 4.17.24
      js-yaml: ^4.1.1
  postman-collection:
    dependencies:
      lodash: 4.17.24
  '@esbuild-kit/core-utils':
    dependencies:
      esbuild: ^0.25.0

overrides:
  '@babel/core': '>=7.29.1'
  ioredis: 5.10.1
  esbuild: '>=0.28.1'
  '@esbuild-kit/core-utils>esbuild': '>=0.28.1'
  lodash: '>=4.17.24'
  '@grpc/grpc-js': '>=1.14.4'
  js-yaml: '>=4.1.1'
  fast-xml-parser: '>=5.7.0'
  hono: '>=4.12.21'
  markdown-it: '>=14.1.1'
  minimatch: 10.2.5
  micromatch>picomatch: 4.0.4
  rollup: '>=4.59.0'
  vite: '>=8.0.16 <9'
  fastify: '>=5.8.5'
  '@fastify/static': '>=9.1.1'
  dompurify: '>=3.4.11'
  drizzle-orm: '>=0.45.2'
  i18next-fs-backend: '>=2.6.4'
  i18next-http-middleware: '>=3.9.3'
  qs: '>=6.15.2'
  tmp: '>=0.2.6'
  undici: '>=7.28.0 <8'
  uuid: '>=11.1.1'
  yaml@1.10.2: 1.10.3
