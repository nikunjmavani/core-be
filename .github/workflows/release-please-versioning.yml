# Release-please: conventional commits → release PR (CHANGELOG + version bump) → merge → GitHub Release + tag.
# Uses the maintained googleapis/release-please-action (see https://github.com/googleapis/release-please).
#
# Two release channels — each tracks its own version via a dedicated manifest so they never collide:
#   - main (production):  stable releases (e.g. v2.1.0).
#                         Config: .github/release-please/config.json
#                         Manifest: .github/release-please/manifest.json
#   - dev  (development): pre-releases (e.g. v2.1.0-dev.0) — `prerelease: true` + `prerelease-type: dev`.
#                         Config: .github/release-please/config.dev.json
#                         Manifest: .github/release-please/manifest.dev.json
#
# GitHub Releases (both stable and prerelease) emit a `release: published` event that triggers
# release-attach-sbom.yml, so dev pre-releases also get a CycloneDX SBOM attached.
#
# Uses RELEASE_PLEASE_TOKEN (PAT) so merging the release PR triggers downstream CI.
# If the secret is not configured, the workflow skips release automation without failing CI.
# See docs/deployment/ci-cd/cicd-and-deployment.md (§4 Release and versioning).

name: Release Please

on:
  push:
    branches: [main, dev]

permissions:
  contents: write
  pull-requests: write
  issues: write

# Serialize runs per branch so two rapid pushes can't race on the same release PR.
# Never cancel in-progress runs — a release commit must not be skipped.
concurrency:
  group: release-please-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please (${{ github.ref_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      # main → "", dev → ".dev"; picks the matching config + manifest file pair.
      CHANNEL_SUFFIX: ${{ github.ref_name == 'dev' && '.dev' || '' }}
    steps:
      - name: Skip release-please when token is not configured
        if: env.RELEASE_PLEASE_TOKEN == ''
        run: echo "RELEASE_PLEASE_TOKEN is not configured; skipping release automation."

      - name: Run release-please
        if: env.RELEASE_PLEASE_TOKEN != ''
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ env.RELEASE_PLEASE_TOKEN }}
          target-branch: ${{ github.ref_name }}
          config-file: .github/release-please/config${{ env.CHANNEL_SUFFIX }}.json
          manifest-file: .github/release-please/manifest${{ env.CHANNEL_SUFFIX }}.json
