# Monthly disaster-recovery drill — checklist plus optional automated restore verification.
# Set NEON_DRILL_DATABASE_URL in repository secrets to run migrations + integration tests against a throwaway Neon branch.
# Records restore duration and fails when elapsed >= RTO_MINUTES. See docs/process/backup-drills.md.

name: Restore drill (monthly)

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      recorded_rto_minutes:
        description: >-
          Optional human-measured end-to-end RTO in minutes (Neon branch restore through smoke).
          Recorded and checked against RTO_MINUTES when automated restore is skipped.
        required: false
        type: string

env:
  RTO_MINUTES: '60'

permissions:
  contents: read

concurrency:
  group: restore-drill
  cancel-in-progress: false

jobs:
  checklist:
    name: DR drill checklist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print drill steps
        run: |
          set -euo pipefail
          echo "::notice title=Restore drill::See docs/process/backup-drills.md and docs/process/dr-runbook.md"
          test -f docs/process/backup-drills.md
          test -f docs/process/dr-runbook.md

  restore-integration:
    name: Restore branch — migrate and integration smoke
    needs: checklist
    if: ${{ secrets.NEON_DRILL_DATABASE_URL != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      redis:
        image: redis:8.6.3-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.NEON_DRILL_DATABASE_URL }}
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-min-32-chars-xxxxxxxx
      ALLOWED_ORIGINS: http://localhost:3000
      AUDIT_RETENTION_DAYS: 90
      SESSION_RETENTION_DAYS: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Mark restore window start
        run: echo "RESTORE_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - name: Run migrations on restored branch
        run: pnpm db:migrate

      - name: Integration smoke on restored database
        run: pnpm test:integration -- --run src/domains/auth/__tests__/integration/auth.integration.test.ts

      - name: Record restore duration and assert RTO
        if: always()
        run: |
          set -euo pipefail
          restore_end_epoch=$(date +%s)
          restore_seconds=$((restore_end_epoch - RESTORE_START_EPOCH))
          rto_minutes="${RTO_MINUTES}"
          rto_target_seconds=$((rto_minutes * 60))
          within_rto_target=false
          if (( restore_seconds < rto_target_seconds )); then
            within_rto_target=true
          fi

          cat > restore-drill-rto.json <<EOF
          {
            "recorded_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_run_id": "${GITHUB_RUN_ID}",
            "metric": "migrate_and_integration_smoke_seconds",
            "restore_seconds": ${restore_seconds},
            "rto_minutes": ${rto_minutes},
            "rto_target_seconds": ${rto_target_seconds},
            "within_rto_target": ${within_rto_target}
          }
          EOF

          {
            echo "## Restore drill — automated RTO"
            echo ""
            echo "| Field | Value |"
            echo "| ----- | ----- |"
            echo "| Metric | \`db:migrate\` + auth integration smoke |"
            echo "| Restore time | **${restore_seconds}s** ($(awk "BEGIN {printf \"%.1f\", ${restore_seconds}/60}") min) |"
            echo "| RTO target | **${rto_minutes} min** (${rto_target_seconds}s) |"
            echo "| Within target | ${within_rto_target} |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::notice title=Restore drill RTO::restore_seconds=${restore_seconds} rto_minutes=${rto_minutes} within_target=${within_rto_target}"

          if [[ "${within_rto_target}" != "true" ]]; then
            echo "::error title=RTO exceeded::Restore took ${restore_seconds}s; target is ${rto_target_seconds}s (${rto_minutes} min)."
            exit 1
          fi

      - name: Upload RTO report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restore-drill-rto
          path: restore-drill-rto.json
          if-no-files-found: error

  record-rto:
    name: Record and publish RTO
    needs: [checklist, restore-integration]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      within_rto_target: ${{ steps.publish.outputs.within_rto_target }}
      restore_seconds: ${{ steps.publish.outputs.restore_seconds }}
      rto_minutes: ${{ steps.publish.outputs.rto_minutes }}
    steps:
      - name: Download automated RTO report
        if: needs.restore-integration.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: restore-drill-rto

      - name: Record manual RTO from workflow input
        if: github.event_name == 'workflow_dispatch' && inputs.recorded_rto_minutes != ''
        run: |
          set -euo pipefail
          if ! [[ "${{ inputs.recorded_rto_minutes }}" =~ ^[0-9]+([.][0-9]+)?$ ]]; then
            echo "::error::recorded_rto_minutes must be a positive number"
            exit 1
          fi
          manual_minutes="${{ inputs.recorded_rto_minutes }}"
          manual_seconds=$(awk "BEGIN {printf \"%d\", ${manual_minutes} * 60}")
          rto_minutes="${RTO_MINUTES}"
          rto_target_seconds=$((rto_minutes * 60))
          within_rto_target=false
          if (( manual_seconds < rto_target_seconds )); then
            within_rto_target=true
          fi

          cat > restore-drill-rto-manual.json <<EOF
          {
            "recorded_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_run_id": "${GITHUB_RUN_ID}",
            "metric": "manual_end_to_end_minutes",
            "restore_minutes": ${manual_minutes},
            "restore_seconds": ${manual_seconds},
            "rto_minutes": ${rto_minutes},
            "rto_target_seconds": ${rto_target_seconds},
            "within_rto_target": ${within_rto_target}
          }
          EOF

          {
            echo "## Restore drill — manual RTO"
            echo ""
            echo "| Field | Value |"
            echo "| ----- | ----- |"
            echo "| Metric | Human end-to-end (Neon branch through smoke) |"
            echo "| Restore time | **${manual_minutes} min** (${manual_seconds}s) |"
            echo "| RTO target | **${rto_minutes} min** (${rto_target_seconds}s) |"
            echo "| Within target | ${within_rto_target} |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::notice title=Restore drill manual RTO::restore_minutes=${manual_minutes} within_target=${within_rto_target}"

          if [[ "${within_rto_target}" != "true" ]]; then
            echo "::error title=RTO exceeded::Manual RTO ${manual_minutes} min exceeds ${rto_minutes}-minute target."
            exit 1
          fi

      - name: Upload manual RTO report
        if: github.event_name == 'workflow_dispatch' && inputs.recorded_rto_minutes != ''
        uses: actions/upload-artifact@v4
        with:
          name: restore-drill-rto-manual
          path: restore-drill-rto-manual.json

      - name: Note when RTO was not measured
        if: >-
          needs.restore-integration.result != 'success' &&
          (github.event_name != 'workflow_dispatch' || inputs.recorded_rto_minutes == '')
        run: |
          rto_minutes="${RTO_MINUTES}"
          cat > restore-drill-rto-report.json <<EOF
          {
            "recorded_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_run_id": "${GITHUB_RUN_ID}",
            "metric": "rto_not_recorded",
            "rto_minutes": ${rto_minutes},
            "rto_target_seconds": $((rto_minutes * 60)),
            "within_rto_target": null
          }
          EOF
          {
            echo "## Restore drill — RTO not recorded"
            echo ""
            echo "Set repository secret \`NEON_DRILL_DATABASE_URL\` for automated migrate + smoke timing,"
            echo "or re-run with workflow input \`recorded_rto_minutes\` after a human drill."
            echo ""
            echo "Target: **< ${rto_minutes} minutes** (see docs/process/backup-drills.md)."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning title=Restore drill::RTO not recorded — configure NEON_DRILL_DATABASE_URL or provide recorded_rto_minutes"

      - name: Publish consolidated RTO report
        id: publish
        if: always()
        run: |
          set -euo pipefail
          rto_minutes="${RTO_MINUTES}"
          rto_target_seconds=$((rto_minutes * 60))

          if [[ -f restore-drill-rto.json ]]; then
            cp restore-drill-rto.json restore-drill-rto-report.json
          elif [[ -f restore-drill-rto-manual.json ]]; then
            cp restore-drill-rto-manual.json restore-drill-rto-report.json
          elif [[ ! -f restore-drill-rto-report.json ]]; then
            echo "::error::No RTO report produced"
            exit 1
          fi

          within_rto_target=$(jq -r '.within_rto_target' restore-drill-rto-report.json)
          restore_seconds=$(jq -r '.restore_seconds // empty' restore-drill-rto-report.json)
          metric=$(jq -r '.metric' restore-drill-rto-report.json)

          echo "within_rto_target=${within_rto_target}" >> "$GITHUB_OUTPUT"
          echo "restore_seconds=${restore_seconds}" >> "$GITHUB_OUTPUT"
          echo "rto_minutes=${rto_minutes}" >> "$GITHUB_OUTPUT"

          {
            echo "## Restore drill — consolidated RTO"
            echo ""
            echo "| Field | Value |"
            echo "| ----- | ----- |"
            echo "| Source | ${metric} |"
            echo "| RTO target | **${rto_minutes} min** (${rto_target_seconds}s) |"
            if [[ -n "${restore_seconds}" && "${restore_seconds}" != "null" ]]; then
              echo "| Restore time | **${restore_seconds}s** |"
            fi
            echo "| Within target | ${within_rto_target} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload consolidated RTO report
        if: always() && hashFiles('restore-drill-rto-report.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: restore-drill-rto-report
          path: restore-drill-rto-report.json
          if-no-files-found: error

  alert-on-failure:
    name: Alert on drill failure
    needs: [checklist, restore-integration, record-rto]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Emit workflow failure notice
        run: |
          echo "::error title=Restore drill failed::Review docs/process/backup-drills.md — RTO target is ${RTO_MINUTES} minutes."
