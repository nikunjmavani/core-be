# Validates commit messages on main/dev so squash-merge and direct-push commits stay conventional.
# See commitlint.config.cjs and .husky/commit-msg.

name: CommitLint

on:
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Validate commit messages
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            COMMITS="$(git rev-list --first-parent --reverse "$AFTER")"
          else
            COMMITS="$(git rev-list --first-parent --reverse "$BEFORE..$AFTER")"
          fi

          if [ -z "$COMMITS" ]; then
            echo "No first-parent commits to lint."
            exit 0
          fi

          for COMMIT in $COMMITS; do
            echo "Linting commit $COMMIT"
            git log -1 --format=%B "$COMMIT" | pnpm exec commitlint --verbose
          done
