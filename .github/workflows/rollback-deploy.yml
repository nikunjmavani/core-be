# One-click rollback: redeploy the `:previous` GHCR images (retagged by the last
# successful production deploy in reusable-railway-deploy.yml) instead of building
# anything. Turns a bad-release incident into a ~3-minute dispatch + approval.
#
# Scope and caveats (see docs/deployment/runbooks/rollback-deploy.md):
#   - Rolls back APPLICATION CODE only. Database migrations are forward-only and
#     are NOT reverted — the previous image must tolerate the current schema
#     (this repo's migration lint enforces additive/compatible migrations, which
#     is what makes image rollback safe in the common case).
#   - `:previous` exists only after at least one successful deploy retagged it.
#   - The environment approval gate still applies — the required reviewer
#     approves the rollback exactly like a deploy.
#   - After rolling back, land a real fix or revert on the normal path; the next
#     successful deploy overwrites `:previous` with the rolled-back-from image.

name: Rollback deploy (previous image)

on:
  workflow_dispatch:
    inputs:
      target:
        description: GitHub Environment to roll back
        required: true
        type: choice
        options:
          - production
          - development

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

permissions:
  contents: read
  packages: write

concurrency:
  group: rollback-deploy-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  resolve-image:
    name: Resolve previous image ref
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      api_image: ${{ steps.identity.outputs.api_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Image names come from the generated project identity — never literals
      # (enforced by project-identity.policy.unit.test.ts).
      - name: Setup project identity
        uses: ./.github/actions/setup-project-identity

      - name: Expose API image name
        id: identity
        run: echo "api_image=${API_IMAGE}" >> "$GITHUB_OUTPUT"

  rollback:
    name: Rollback (${{ inputs.target }})
    needs: resolve-image
    uses: ./.github/workflows/reusable-railway-deploy.yml
    secrets: inherit
    with:
      # Single-trunk: pass the environment explicitly (both environments deploy
      # from main); the reusable selects the matching GitHub Environment + secrets.
      github_environment: ${{ inputs.target }}
      target_branch: main
      # The worker image ref is derived inside the reusable by name substitution.
      image_override: ghcr.io/${{ github.repository }}/${{ needs.resolve-image.outputs.api_image }}:previous
