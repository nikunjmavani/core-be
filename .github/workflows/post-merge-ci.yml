name: Post-merge CI

# Single post-merge pipeline after a PR merges into dev or main (or manual workflow_dispatch).
# PR CI (pr-ci.yml) is the merge gate — same SHA already passed lint, typecheck, unit, build,
# security, and contract/property. Post-merge runs publish/deploy automation only.
#
# Optimized flow (top to bottom dependencies):
#   detect changes → commitlint
#       ├─ docker / build + trivy
#       ├─ matrix tests
#       └─ sbom
#   then release-please
#       ├─ release sbom
#       └─ api docs
#   then resolve environment → deploy → API smoke on deployed URL
#
# Branch → GitHub Environment mapping for deploy (only difference between dev and main):
#   dev  → development
#   main → production

on:
  pull_request:
    types: [closed]
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: post-merge-ci-${{ github.event_name == 'workflow_dispatch' && github.ref || format('refs/heads/{0}', github.event.pull_request.base.ref) }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gate:
    name: Verify merge
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      post_merge_sha: ${{ steps.target.outputs.post_merge_sha }}
      post_merge_branch: ${{ steps.target.outputs.post_merge_branch }}
    steps:
      - name: Resolve post-merge target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "post_merge_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "post_merge_branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "post_merge_sha=${{ github.event.pull_request.merge_commit_sha }}" >> "$GITHUB_OUTPUT"
            echo "post_merge_branch=${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Post-merge target
        run: |
          echo "Post-merge CI for branch ${POST_MERGE_BRANCH} at ${POST_MERGE_SHA}"
        env:
          POST_MERGE_BRANCH: ${{ steps.target.outputs.post_merge_branch }}
          POST_MERGE_SHA: ${{ steps.target.outputs.post_merge_sha }}

  changes:
    name: Detect changes
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      src-code: ${{ steps.filter.outputs.src-code }}
      docker: ${{ steps.filter.outputs.docker }}
      ci-config: ${{ steps.filter.outputs.ci-config }}
      docs-artifacts: ${{ steps.filter.outputs.docs-artifacts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.post_merge_sha }}
          fetch-depth: 0

      - name: Resolve diff base
        id: diff_base
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if git rev-parse "${{ needs.gate.outputs.post_merge_sha }}^" >/dev/null 2>&1; then
              echo "sha=$(git rev-parse "${{ needs.gate.outputs.post_merge_sha }}^")" >> "$GITHUB_OUTPUT"
            else
              echo "sha=${{ needs.gate.outputs.post_merge_sha }}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Path filter
        uses: dorny/paths-filter@v4
        id: filter
        with:
          base: ${{ steps.diff_base.outputs.sha }}
          ref: ${{ needs.gate.outputs.post_merge_sha }}
          filters: |
            src-code:
              - 'src/**'
              - 'migrations/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'Dockerfile.agent'
              - 'vitest.config.ts'
              - 'tooling/**'
            docker:
              - 'Dockerfile'
              - 'Dockerfile.worker'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tooling/ci/check-dockerfile-sync.mjs'
            ci-config:
              - '.github/**'
            docs-artifacts:
              - 'docs/openapi/**'
              - 'docs/postman-collection.json'

  commitlint:
    name: Commitlint
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.post_merge_sha }}
          fetch-depth: 0

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Validate commit messages
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
          else
            BEFORE="${{ github.event.pull_request.base.sha }}"
            AFTER="${{ needs.gate.outputs.post_merge_sha }}"
          fi

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            COMMITS="$(git rev-list --first-parent --reverse "$AFTER")"
          else
            COMMITS="$(git rev-list --first-parent --reverse "$BEFORE..$AFTER")"
          fi

          if [ -z "$COMMITS" ]; then
            echo "No first-parent commits to lint."
            exit 0
          fi

          for COMMIT in $COMMITS; do
            echo "Linting commit $COMMIT"
            git log -1 --format=%B "$COMMIT" | pnpm exec commitlint --verbose
          done

  docker-build-push:
    name: Docker
    needs: [changes, commitlint]
    if: |
      always() &&
      needs.commitlint.result == 'success' &&
      (
        needs.changes.outputs.src-code == 'true' ||
        needs.changes.outputs.docker == 'true' ||
        needs.changes.outputs.ci-config == 'true'
      )
    uses: ./.github/workflows/reusable-docker-build-trivy.yml
    secrets: inherit
    with:
      merge_commit_sha: ${{ needs.gate.outputs.post_merge_sha }}
      target_branch: ${{ needs.gate.outputs.post_merge_branch }}

  sbom:
    name: SBOM
    needs: [changes, commitlint]
    if: |
      always() &&
      needs.commitlint.result == 'success' &&
      needs.changes.outputs.src-code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.post_merge_sha }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom.cyclonedx.json
          path: sbom.cyclonedx.json

  api-docs:
    name: API docs
    needs: [release-please, changes]
    if: |
      always() &&
      needs.release-please.result != 'failure' &&
      needs.release-please.result != 'cancelled' &&
      (needs.changes.outputs.src-code == 'true' || needs.changes.outputs.docs-artifacts == 'true')
    uses: ./.github/workflows/reusable-openapi-postman-publish.yml
    secrets: inherit
    with:
      merge_commit_sha: ${{ needs.gate.outputs.post_merge_sha }}
      target_branch: ${{ needs.gate.outputs.post_merge_branch }}
      github_environment: ${{ needs.gate.outputs.post_merge_branch == 'main' && 'production' || 'development' }}
      publish_hosted_docs: true

  release-please:
    name: Release Please
    needs: [docker-build-push, matrix-tests, sbom]
    if: |
      always() &&
      (needs.docker-build-push.result == 'success' || needs.docker-build-push.result == 'skipped') &&
      (needs.matrix-tests.result == 'success' || needs.matrix-tests.result == 'skipped') &&
      (needs.sbom.result == 'success' || needs.sbom.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created == 'true' && 'true' || 'false' }}
    env:
      CHANNEL_SUFFIX: ${{ needs.gate.outputs.post_merge_branch == 'dev' && '.dev' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.post_merge_sha }}
          fetch-depth: 0

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ github.token }}
          target-branch: ${{ needs.gate.outputs.post_merge_branch }}
          config-file: .github/release-please/config${{ env.CHANNEL_SUFFIX }}.json
          manifest-file: .github/release-please/manifest${{ env.CHANNEL_SUFFIX }}.json

  attach-release-sbom:
    name: Release SBOM
    needs: [sbom, release-please]
    if: |
      always() &&
      needs.release-please.outputs.releases_created == 'true' &&
      needs.sbom.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag_name="$(gh release list --limit 1 --json tagName --jq '.[0].tagName')"
          if [ -z "${tag_name}" ] || [ "${tag_name}" = "null" ]; then
            echo "::error::No GitHub Release found after release-please."
            exit 1
          fi
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "Attaching SBOM to release ${tag_name}"

      - name: Download SBOM artifact from sbom job
        uses: actions/download-artifact@v8
        with:
          name: sbom.cyclonedx.json
          path: .

      - name: Upload SBOM to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          files: sbom.cyclonedx.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

  resolve-environment:
    name: Resolve Environment
    needs:
      - docker-build-push
      - matrix-tests
      - api-docs
      - release-please
      - attach-release-sbom
    runs-on: ubuntu-latest
    outputs:
      post_merge_sha: ${{ steps.target.outputs.post_merge_sha }}
      post_merge_branch: ${{ steps.target.outputs.post_merge_branch }}
      github_environment: ${{ steps.target.outputs.github_environment }}
    if: |
      always() &&
      needs.docker-build-push.result == 'success' &&
      (needs.matrix-tests.result == 'success' || needs.matrix-tests.result == 'skipped') &&
      (needs.api-docs.result == 'success' || needs.api-docs.result == 'skipped') &&
      needs.release-please.result != 'failure' &&
      needs.release-please.result != 'cancelled' &&
      (needs.attach-release-sbom.result == 'success' || needs.attach-release-sbom.result == 'skipped')
    steps:
      - name: Resolve post-merge target and environment
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "post_merge_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "post_merge_branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "post_merge_sha=${{ github.event.pull_request.merge_commit_sha }}" >> "$GITHUB_OUTPUT"
            echo "post_merge_branch=${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            branch="${{ github.ref_name }}"
          else
            branch="${{ github.event.pull_request.base.ref }}"
          fi

          if [ "$branch" = "main" ]; then
            echo "github_environment=production" >> "$GITHUB_OUTPUT"
          elif [ "$branch" = "dev" ]; then
            echo "github_environment=development" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unsupported branch for deployment: $branch"
            exit 1
          fi

  deploy:
    name: Deploy
    needs:
      - resolve-environment
    if: needs.resolve-environment.result == 'success'
    uses: ./.github/workflows/reusable-railway-deploy.yml
    secrets: inherit
    with:
      merge_commit_sha: ${{ needs.gate.outputs.post_merge_sha }}
      target_branch: ${{ needs.gate.outputs.post_merge_branch }}
