name: Post-merge CI

# Single post-merge pipeline on protected branch pushes (dev/main) or manual workflow_dispatch.
# PR CI (pr-ci.yml) is the merge gate — same SHA already passed lint, typecheck, unit, build,
# security, and contract/property. Post-merge runs publish/deploy automation only.
#
# Optimized flow (top to bottom dependencies):
#   detect changes
#       ├─ docker / build + trivy → matrix tests
#       └─ sbom
#   then release-please
#       ├─ release sbom
#       └─ api docs
#   then deploy → API /readyz probe on deployed URL
#
# Branch → GitHub Environment mapping for deploy (only difference between dev and main):
#   dev  → development
#   main → production

on:
  push:
    branches: [dev, main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: Skip matrix integration tests
        required: false
        type: boolean
        default: false
      skip_security:
        description: Skip Docker build and Trivy scan
        required: false
        type: boolean
        default: false
      skip_docker:
        description: Skip Docker build/push (alias for skip_security when only docker is needed)
        required: false
        type: boolean
        default: false
      skip_deploy:
        description: Skip Railway deploy
        required: false
        type: boolean
        default: false
      skip_docs:
        description: Skip API docs generation and publish
        required: false
        type: boolean
        default: false

concurrency:
  group: post-merge-ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      src-code: ${{ steps.filter.outputs.src-code }}
      docker: ${{ steps.filter.outputs.docker }}
      ci-config: ${{ steps.filter.outputs.ci-config }}
      docs-artifacts: ${{ steps.filter.outputs.docs-artifacts }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          # Full history avoids the dorny/paths-filter shallow-deepen race
          # ("fatal: shallow file has changed since we read it") when it
          # iteratively fetches to find the merge-base between main and dev.
          # The PR-CI changes job stays at fetch-depth: 1 because it compares
          # against the PR base SHA, not main, and never deepens.
          fetch-depth: 0

      - name: Path filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            src-code:
              - 'src/**'
              - 'migrations/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'Dockerfile.agent'
              - 'vitest.config.ts'
              - 'tooling/**'
            docker:
              - 'Dockerfile'
              - 'Dockerfile.worker'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tooling/ci/check-dockerfile-sync.mjs'
            ci-config:
              - '.github/**'
            docs-artifacts:
              - 'docs/openapi/**'
              - 'docs/postman-collection.json'
              - 'src/**'
              - 'package.json'
              - 'pnpm-lock.yaml'

  docker-build-push:
    name: Docker
    needs: [changes]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    if: |
      always() &&
      inputs.skip_security != true &&
      inputs.skip_docker != true &&
      (
        needs.changes.outputs.src-code == 'true' ||
        needs.changes.outputs.docker == 'true' ||
        needs.changes.outputs.ci-config == 'true'
      )
    uses: ./.github/workflows/reusable-docker-build-trivy.yml
    secrets: inherit
    with:
      merge_commit_sha: ${{ github.sha }}
      target_branch: ${{ github.ref_name }}

  matrix-tests:
    name: Matrix Tests
    needs: [changes, sbom, docker-build-push]
    if: |
      always() &&
      inputs.skip_tests != true &&
      (
        needs.changes.outputs.src-code == 'true' ||
        needs.changes.outputs.ci-config == 'true'
      ) &&
      (
        needs.docker-build-push.result == 'success' ||
        needs.docker-build-push.result == 'skipped'
      )
    uses: ./.github/workflows/reusable-vitest-postgres-redis.yml
    secrets: inherit
    with:
      merge_commit_sha: ${{ github.sha }}
      target_branch: ${{ github.ref_name }}

  sbom:
    name: SBOM
    needs: [changes]
    permissions:
      contents: read
      id-token: write
      attestations: write
    if: |
      always() &&
      needs.changes.outputs.src-code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Attest CycloneDX source SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: sbom.cyclonedx.json
          sbom-path: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom.cyclonedx.json
          path: sbom.cyclonedx.json
          retention-days: 30

  api-docs:
    name: API docs
    # API docs (OpenAPI + Postman + Scalar Registry) publish from the merged source at
    # github.sha and are intentionally decoupled from release-please: a release-please
    # failure (e.g. an expired RELEASE_PLEASE_TOKEN) must NOT skip docs publishing.
    # release-please only opens a release PR — it does not bump package.json in this run,
    # so there is nothing for the docs job to wait on.
    needs: [changes]
    if: |
      always() &&
      inputs.skip_docs != true &&
      (
        needs.changes.outputs.docs-artifacts == 'true' ||
        needs.changes.outputs.src-code == 'true'
      )
    uses: ./.github/workflows/reusable-openapi-postman-publish.yml
    secrets: inherit
    with:
      merge_commit_sha: ${{ github.sha }}
      target_branch: ${{ github.ref_name }}
      github_environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
      publish_hosted_docs: true

  release-please:
    name: Release Please
    needs: [matrix-tests]
    if: |
      always() &&
      (needs.matrix-tests.result == 'success' || needs.matrix-tests.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # release-please creates GitHub Releases with RELEASE_PLEASE_TOKEN (a PAT with
    # the `workflow` scope; the default GITHUB_TOKEN cannot create releases here —
    # the create-a-release API path requires that scope). The token is a GitHub
    # Environment secret synced via `pnpm github:sync`, so this job selects the
    # matching environment to read it: dev → development, main → production. Both
    # environments have no protection rules, so this does not gate the run.
    environment: ${{ github.ref_name == 'dev' && 'development' || 'production' }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      # Some recent release-please-action paths invoke endpoints that the
      # default `GITHUB_TOKEN` cannot reach unless `id-token: write` is also
      # granted (OIDC-scoped octokit calls inside the action). Adding it here
      # is a no-op for the actual release create/update but unblocks the
      # underlying API call when the action falls into that path. Pair with
      # `actions: write` so the action can update the run's own status when
      # a release PR-creation step runs after release creation.
      id-token: write
      actions: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created == 'true' && 'true' || 'false' }}
    env:
      CHANNEL_SUFFIX: ${{ github.ref_name == 'dev' && '.dev' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          # PAT (repo + workflow scopes) read from the GitHub Environment secret
          # selected by the job `environment:` above. Falls back to github.token
          # until RELEASE_PLEASE_TOKEN is provisioned (github.token cannot create
          # releases, but the fallback keeps release-PR creation working meanwhile).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          target-branch: ${{ github.ref_name }}
          config-file: .github/release-please/config${{ env.CHANNEL_SUFFIX }}.json
          manifest-file: .github/release-please/manifest${{ env.CHANNEL_SUFFIX }}.json

      - name: Lint-fix CHANGELOGs on release PR branches
        if: steps.release.outputs.prs_created == 'true' || steps.release.outputs.pr != ''
        env:
          # PAT (not github.token) so the lint-fix commit pushed to the release PR
          # branch re-triggers the PR checks that auto-merge waits on.
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          mapfile -t branches < <(
            jq -rn --arg pr "${RELEASE_PR}" --arg prs "${RELEASE_PRS}" '
              def parse_object($raw):
                try ($raw | fromjson) catch null;
              def parse_array($raw):
                try ($raw | fromjson) catch [];
              (
                [parse_object($pr) | .headBranchName // .headRefName // empty] +
                [parse_array($prs)[] | .headBranchName // .headRefName // empty]
              )
              | map(select(. != null and . != ""))
              | unique
              | .[]
            '
          )

          if [ "${#branches[@]}" -eq 0 ]; then
            echo "No release PR branches to lint-fix."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for branch in "${branches[@]}"; do
            echo "::group::Lint-fix CHANGELOG on ${branch}"
            git fetch origin "${branch}" --depth=2
            git checkout -B "${branch}" "origin/${branch}"
            npx --yes markdownlint-cli2@0.15.0 \
              --config .markdownlint.json \
              --fix \
              'CHANGELOG*.md' || true
            if [ -n "$(git status --porcelain CHANGELOG*.md 2>/dev/null)" ]; then
              git add CHANGELOG*.md
              git commit -m "chore(docs): lint-fix CHANGELOG after release-please"
              git push origin "${branch}"
              echo "Pushed CHANGELOG lint-fix to ${branch}"
            else
              echo "${branch} CHANGELOG already lint-clean."
            fi
            echo "::endgroup::"
          done

      - name: Enable auto-merge on release PRs
        # Use the PAT (not github.token) so the eventual auto-merge of the release
        # PR is attributed to the PAT and its push to dev/main RE-TRIGGERS this
        # workflow. A merge performed with the default GITHUB_TOKEN does not start
        # a new workflow run, so the Release Please job would never run on the
        # merge commit and the tag / GitHub Release would never be created.
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
          TARGET_BRANCH: ${{ github.ref_name }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          pr_numbers_from_outputs="$(
            jq -rn --arg pr "${RELEASE_PR}" --arg prs "${RELEASE_PRS}" '
              def parse_object($raw):
                try ($raw | fromjson) catch null;
              def parse_array($raw):
                try ($raw | fromjson) catch [];
              (
                [parse_object($pr) | .number // empty] +
                [parse_array($prs)[] | .number // empty]
              )
              | map(select(. != null))
              | unique
              | .[]
            '
          )"

          pr_numbers_from_api="$(
            gh pr list \
              --repo "${GH_REPOSITORY}" \
              --state open \
              --base "${TARGET_BRANCH}" \
              --search 'head:release-please--branches--' \
              --json number \
              --jq '.[].number'
          )"

          pr_numbers="$(printf '%s\n%s\n' "${pr_numbers_from_outputs}" "${pr_numbers_from_api}" | awk 'NF' | sort -u)"

          if [ -z "${pr_numbers}" ]; then
            echo "No open release PRs to auto-merge."
            exit 0
          fi

          for pr_number in ${pr_numbers}; do
            echo "Enabling auto-merge for release PR #${pr_number}"
            gh pr merge "${pr_number}" --auto --merge --delete-branch=false
          done

  release-sbom:
    name: Release SBOM
    needs: [sbom, release-please]
    if: |
      always() &&
      needs.release-please.outputs.releases_created == 'true' &&
      needs.sbom.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          expected_prerelease="${{ github.ref_name == 'dev' && 'true' || 'false' }}"
          tag_name="$(
            gh release list \
              --repo "${GH_REPOSITORY}" \
              --limit 20 \
              --json tagName,isPrerelease \
              --jq "[.[] | select((.isPrerelease | tostring) == \"${expected_prerelease}\")][0].tagName // \"\""
          )"
          if [ -z "${tag_name}" ] || [ "${tag_name}" = "null" ]; then
            echo "::error::No GitHub Release found after release-please."
            exit 1
          fi
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "Attaching SBOM to release ${tag_name}"

      - name: Download SBOM artifact from sbom job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom.cyclonedx.json
          path: .

      - name: Upload SBOM to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          files: sbom.cyclonedx.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

  dispatch-post-release-backmerge:
    name: Dispatch post-release back-merge
    needs: [release-please, deploy]
    if: |
      always() &&
      github.ref_name == 'main' &&
      needs.release-please.outputs.releases_created == 'true' &&
      needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read
    steps:
      - name: Resolve stable release version
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag_name="$(
            gh release list \
              --repo "${GH_REPOSITORY}" \
              --limit 20 \
              --json tagName,isPrerelease \
              --jq '[.[] | select(.isPrerelease == false)][0].tagName // ""'
          )"
          if [ -z "${tag_name}" ] || [ "${tag_name}" = "null" ]; then
            echo "::error::No stable GitHub Release found after release-please."
            exit 1
          fi
          version="${tag_name#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Dispatching post-release back-merge for ${tag_name}"

      - name: Dispatch back-merge workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          gh workflow run post-release-backmerge.yml \
            --repo "${GH_REPOSITORY}" \
            --ref main \
            --field "version=${VERSION}"

  deploy:
    name: Deploy
    needs:
      - changes
      - docker-build-push
      - api-docs
      - release-sbom
    permissions:
      contents: read
      packages: write
    if: |
      always() &&
      inputs.skip_deploy != true &&
      (needs.api-docs.result == 'success' || needs.api-docs.result == 'skipped') &&
      (needs.release-sbom.result == 'success' || needs.release-sbom.result == 'skipped') &&
      needs.docker-build-push.result == 'success'
    uses: ./.github/workflows/reusable-railway-deploy.yml
    secrets: inherit
    with:
      merge_commit_sha: ${{ github.sha }}
      target_branch: ${{ github.ref_name }}

  notify-failure:
    name: Notify failure
    needs:
      - docker-build-push
      - matrix-tests
      - deploy
      - dispatch-post-release-backmerge
      - release-please
    if: |
      always() &&
      (
        needs.docker-build-push.result == 'failure' ||
        needs.matrix-tests.result == 'failure' ||
        needs.deploy.result == 'failure' ||
        needs.dispatch-post-release-backmerge.result == 'failure' ||
        needs.release-please.result == 'failure'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Emit post-merge failure notice
        env:
          DOCKER_RESULT: ${{ needs.docker-build-push.result }}
          TESTS_RESULT: ${{ needs.matrix-tests.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          BACKMERGE_RESULT: ${{ needs.dispatch-post-release-backmerge.result }}
          RELEASE_RESULT: ${{ needs.release-please.result }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          echo "::error title=Post-merge CI failed::docker=${DOCKER_RESULT} tests=${TESTS_RESULT} deploy=${DEPLOY_RESULT} backmerge=${BACKMERGE_RESULT} release=${RELEASE_RESULT} — ${WORKFLOW_URL}"

      - name: Open or update ci-failure issue
        # Run annotations only notify someone already looking at the Actions tab.
        # An issue generates a real GitHub notification/email to the owner. One
        # open issue per branch collects repeat failures as comments; closing it
        # acknowledges the incident.
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          DOCKER_RESULT: ${{ needs.docker-build-push.result }}
          TESTS_RESULT: ${{ needs.matrix-tests.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          BACKMERGE_RESULT: ${{ needs.dispatch-post-release-backmerge.result }}
          RELEASE_RESULT: ${{ needs.release-please.result }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh label create ci-failure --repo "$GH_REPOSITORY" \
            --color D93F0B --description "Automated post-merge/guard failure notification" \
            2>/dev/null || true
          title="Post-merge CI failing on ${REF_NAME}"
          body="$(printf '%s\n' \
            "Run: ${WORKFLOW_URL}" \
            "" \
            "| job | result |" \
            "| --- | --- |" \
            "| docker | ${DOCKER_RESULT} |" \
            "| matrix tests | ${TESTS_RESULT} |" \
            "| release-please | ${RELEASE_RESULT} |" \
            "| deploy | ${DEPLOY_RESULT} |" \
            "| back-merge dispatch | ${BACKMERGE_RESULT} |" \
            "" \
            "Close this issue once the failure is resolved.")"
          existing="$(gh issue list --repo "$GH_REPOSITORY" --state open --label ci-failure \
            --search "in:title \"${title}\"" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GH_REPOSITORY" --body "$body"
            echo "Commented on existing ci-failure issue #${existing}."
          else
            gh issue create --repo "$GH_REPOSITORY" --title "$title" --label ci-failure --body "$body"
          fi
