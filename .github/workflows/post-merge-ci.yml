name: Post-merge CI

# Single post-merge pipeline after a PR merges into dev or main (or manual workflow_dispatch).
# PR CI (pr-ci.yml) is the merge gate — same SHA already passed lint, typecheck, unit, build,
# security, and contract/property. Post-merge runs publish/deploy automation only: Docker
# (Trivy + GHCR + container smoke), SBOM, API docs, commitlint, release-please, sync, deploy.
# Full DB integration/chaos suites are local-only (`pnpm test:integration`, `pnpm test:chaos`).
#
# Branch → GitHub Environment mapping for deploy (only difference between dev and main):
#   dev  → development
#   main → production

on:
  pull_request:
    types: [closed]
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: post-merge-ci-${{ github.event_name == 'workflow_dispatch' && github.ref || format('refs/heads/{0}', github.event.pull_request.base.ref) }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  POST_MERGE_SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.pull_request.merge_commit_sha }}
  POST_MERGE_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.event.pull_request.base.ref }}

jobs:
  gate:
    name: Verify merge
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Post-merge target
        run: |
          echo "Post-merge CI for branch ${POST_MERGE_BRANCH} at ${POST_MERGE_SHA}"
        env:
          POST_MERGE_BRANCH: ${{ env.POST_MERGE_BRANCH }}
          POST_MERGE_SHA: ${{ env.POST_MERGE_SHA }}

  changes:
    name: Detect changes
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      src-code: ${{ steps.filter.outputs.src-code }}
      docker: ${{ steps.filter.outputs.docker }}
      ci-config: ${{ steps.filter.outputs.ci-config }}
      docs-artifacts: ${{ steps.filter.outputs.docs-artifacts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.POST_MERGE_SHA }}
          fetch-depth: 0

      - name: Resolve diff base
        id: diff_base
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if git rev-parse "${{ env.POST_MERGE_SHA }}^" >/dev/null 2>&1; then
              echo "sha=$(git rev-parse "${{ env.POST_MERGE_SHA }}^")" >> "$GITHUB_OUTPUT"
            else
              echo "sha=${{ env.POST_MERGE_SHA }}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Path filter
        uses: dorny/paths-filter@v4
        id: filter
        with:
          base: ${{ steps.diff_base.outputs.sha }}
          ref: ${{ env.POST_MERGE_SHA }}
          filters: |
            src-code:
              - 'src/**'
              - 'migrations/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'Dockerfile.agent'
              - 'vitest.config.ts'
              - 'tooling/**'
            docker:
              - 'Dockerfile'
              - 'Dockerfile.worker'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tooling/ci/check-dockerfile-sync.mjs'
            ci-config:
              - '.github/**'
            docs-artifacts:
              - 'docs/openapi/**'
              - 'docs/postman-collection.json'

  commitlint:
    name: Commitlint
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.POST_MERGE_SHA }}
          fetch-depth: 0

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Validate commit messages
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
          else
            BEFORE="${{ github.event.pull_request.base.sha }}"
            AFTER="${{ env.POST_MERGE_SHA }}"
          fi

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            COMMITS="$(git rev-list --first-parent --reverse "$AFTER")"
          else
            COMMITS="$(git rev-list --first-parent --reverse "$BEFORE..$AFTER")"
          fi

          if [ -z "$COMMITS" ]; then
            echo "No first-parent commits to lint."
            exit 0
          fi

          for COMMIT in $COMMITS; do
            echo "Linting commit $COMMIT"
            git log -1 --format=%B "$COMMIT" | pnpm exec commitlint --verbose
          done

  release-please:
    name: Release Please
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created == 'true' && 'true' || 'false' }}
    env:
      CHANNEL_SUFFIX: ${{ env.POST_MERGE_BRANCH == 'dev' && '.dev' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.POST_MERGE_SHA }}
          fetch-depth: 0

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ github.token }}
          target-branch: ${{ env.POST_MERGE_BRANCH }}
          config-file: .github/release-please/config${{ env.CHANNEL_SUFFIX }}.json
          manifest-file: .github/release-please/manifest${{ env.CHANNEL_SUFFIX }}.json

  sync-main-into-dev:
    name: Sync main into dev
    needs: gate
    if: env.POST_MERGE_BRANCH == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    env:
      SYNC_BRANCH: automation/sync-main-into-dev
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Open main to dev sync PR
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main dev

          if git merge-base --is-ancestor origin/main origin/dev; then
            echo "dev already contains main; no sync PR needed."
            exit 0
          fi

          git switch --force-create "$SYNC_BRANCH" origin/dev

          if ! git merge --no-edit origin/main; then
            echo "::error::Automatic main -> dev merge conflicted. Resolve manually by opening a PR from main into dev."
            exit 1
          fi

          git push --force-with-lease origin "$SYNC_BRANCH"

          existing_pr="$(
            gh pr list \
              --base dev \
              --head "$SYNC_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"

          body_file="$(mktemp)"
          cat > "$body_file" <<'EOF'
          ## Summary

          - Syncs `main` back into `dev` so production-only fixes, including urgent security fixes, stay in the development branch.
          - Generated automatically after a PR merges into `main`.

          ## Test plan

          - [ ] CI green on this PR.
          - [ ] Resolve merge conflicts manually if GitHub reports any after the branch is updated.

          EOF

          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" \
              --title "chore: sync main into dev" \
              --body-file "$body_file"
            echo "Updated existing sync PR #$existing_pr"
          else
            gh pr create \
              --base dev \
              --head "$SYNC_BRANCH" \
              --title "chore: sync main into dev" \
              --body-file "$body_file"
            echo "Opened sync main into dev PR (merge manually after review and PR CI)."
          fi

  docker-build-push:
    name: Docker
    needs: [gate, changes]
    if: |
      always() &&
      (
        needs.changes.outputs.src-code == 'true' ||
        needs.changes.outputs.docker == 'true' ||
        needs.changes.outputs.ci-config == 'true'
      )
    uses: ./.github/workflows/reusable-docker-build-trivy.yml
    secrets: inherit
    with:
      merge_commit_sha: ${{ env.POST_MERGE_SHA }}
      target_branch: ${{ env.POST_MERGE_BRANCH }}

  sbom:
    name: SBOM
    needs: [gate, changes]
    if: |
      always() &&
      needs.changes.outputs.src-code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.POST_MERGE_SHA }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom.cyclonedx.json
          path: sbom.cyclonedx.json

  api-docs:
    name: API docs
    needs: [gate, changes]
    if: |
      always() &&
      (needs.changes.outputs.src-code == 'true' || needs.changes.outputs.docs-artifacts == 'true')
    uses: ./.github/workflows/reusable-openapi-postman-publish.yml
    secrets: inherit
    with:
      merge_commit_sha: ${{ env.POST_MERGE_SHA }}
      target_branch: ${{ env.POST_MERGE_BRANCH }}
      github_environment: ${{ env.POST_MERGE_BRANCH == 'main' && 'production' || 'development' }}
      publish_hosted_docs: true

  deploy:
    name: Deploy
    needs:
      - gate
      - commitlint
      - release-please
      - sync-main-into-dev
      - docker-build-push
      - sbom
      - api-docs
    if: |
      always() &&
      needs.docker-build-push.result == 'success' &&
      needs.commitlint.result != 'failure' &&
      needs.commitlint.result != 'cancelled' &&
      needs.release-please.result != 'failure' &&
      needs.release-please.result != 'cancelled' &&
      (needs.sync-main-into-dev.result == 'success' || needs.sync-main-into-dev.result == 'skipped') &&
      (needs.sbom.result == 'success' || needs.sbom.result == 'skipped') &&
      (needs.api-docs.result == 'success' || needs.api-docs.result == 'skipped')
    uses: ./.github/workflows/reusable-railway-deploy.yml
    secrets: inherit
    with:
      merge_commit_sha: ${{ env.POST_MERGE_SHA }}
      target_branch: ${{ env.POST_MERGE_BRANCH }}

  attach-release-sbom:
    name: Release SBOM
    needs: [gate, release-please]
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag_name="$(gh release list --limit 1 --json tagName --jq '.[0].tagName')"
          if [ -z "${tag_name}" ] || [ "${tag_name}" = "null" ]; then
            echo "::error::No GitHub Release found after release-please."
            exit 1
          fi
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "Attaching SBOM to release ${tag_name}"

      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag_name }}

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          files: sbom.cyclonedx.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
