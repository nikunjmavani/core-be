name: PR CI

# Fast merge gate (~2–3 min target). All jobs run in parallel; no Postgres/Redis on PR.
# Lint, typecheck, unit, migration safety lint, and TS/Docker build verification run here.
# Security + contract/property tests stay on PR. Post-merge CI handles Docker publish,
# deploy, release automation after merge (same commit SHA already passed PR CI).
#
# Required checks: see docs/deployment/ci-cd/branch-protection.md

on:
  pull_request:
    branches: [dev, main]

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      src-code: ${{ steps.filter.outputs.src-code }}
      docker: ${{ steps.filter.outputs.docker }}
      ci-config: ${{ steps.filter.outputs.ci-config }}
      docs-only-md: ${{ steps.filter.outputs.docs-only-md == 'true' && steps.filter.outputs.src-code == 'false' && steps.filter.outputs.docker == 'false' && steps.filter.outputs.ci-config == 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Path filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            src-code:
              - 'src/**'
              - 'migrations/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vitest.config.ts'
              - 'tooling/**'
            docker:
              - 'Dockerfile'
              - 'Dockerfile.worker'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tooling/ci/check-dockerfile-sync.mjs'
            ci-config:
              - '.github/**'
            docs-only-md:
              - '**/*.md'
              - 'docs/**'

  lint:
    name: Lint
    needs: [changes]
    if: needs.changes.outputs.docs-only-md != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm lint

  typecheck:
    name: Typecheck
    needs: [changes]
    if: needs.changes.outputs.docs-only-md != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm typecheck

  static-sync:
    name: Static sync
    needs: [changes]
    if: needs.changes.outputs.docs-only-md != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - name: Validate domain structure (strict)
        run: pnpm validate:domain:strict

      - name: Validate domain integration test coverage
        run: pnpm validate:domain:coverage

      - name: Scripts layout (no root-level .ts)
        run: pnpm validate:scripts-layout

      - name: Route catalog in sync
        run: pnpm routes:catalog:check

      - uses: ./.github/actions/test-env

      - name: OpenAPI specs in sync
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/core
          REDIS_URL: redis://localhost:6379
        run: pnpm docs:check

      - name: Env example in sync with schema
        run: |
          pnpm tool:sync-env-example || (echo "::error::.env.example is out of sync with env schema or is missing the # GitHub Secrets / # GitHub Variables top-level halves. See log above. Run pnpm tool:sync-env-example (with --fix if needed)." && exit 1)

  unit:
    needs: [changes]
    if: |
      needs.changes.outputs.docs-only-md != 'true' &&
      (needs.changes.outputs.src-code == 'true' || needs.changes.outputs.ci-config == 'true')
    uses: ./.github/workflows/reusable-vitest-unit-only.yml
    with:
      base-ref: ${{ github.event.pull_request.base.ref }}

  migration-lint:
    name: Migration lint
    needs: [changes]
    if: needs.changes.outputs.docs-only-md != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm db:migrate:lint

  build-verify:
    name: Build verify
    needs: [changes]
    if: |
      needs.changes.outputs.docs-only-md != 'true' &&
      (
        needs.changes.outputs.src-code == 'true' ||
        needs.changes.outputs.docker == 'true' ||
        needs.changes.outputs.ci-config == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # BEGIN GENERATED project-identity
      PROJECT_SLUG: core-be
      PROJECT_DISPLAY_NAME: core-be
      API_IMAGE: core-be-api
      WORKER_IMAGE: core-be-worker
      DOCKER_LOCAL_API_TAG: core-be
      GHCR_CACHE_SCOPE_API: core-be-api
      GHCR_CACHE_SCOPE_WORKER: core-be-worker
      GIT_DEFAULT_BRANCH: dev
      GIT_PRODUCTION_BRANCH: main
      GIT_NON_PRODUCTION_BRANCH: dev
      PROTECTED_BRANCHES_JSON: '["dev","main"]'
      BRANCH_ENV_MAP_JSON: '{"dev":"development","main":"production"}'
      # END GENERATED project-identity
      DOCKER_BUILDKIT: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - run: pnpm build

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Verify Dockerfile.worker sync
        run: node tooling/ci/check-dockerfile-sync.mjs

      - name: Build API Docker image (load only)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          target: api
          load: true
          push: false
          tags: ${{ env.DOCKER_LOCAL_API_TAG }}:pr-verify
          build-args: |
            GENERATE_MCP_DOCS=true
            BUILD_REVISION=${{ github.sha }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ env.GHCR_CACHE_SCOPE_API }}-pr
          cache-to: type=gha,mode=max,scope=${{ env.GHCR_CACHE_SCOPE_API }}-pr

      - name: Build worker Docker image (load only)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: Dockerfile.worker
          load: true
          push: false
          tags: ${{ env.WORKER_IMAGE }}:pr-verify
          build-args: |
            BUILD_REVISION=${{ github.sha }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ env.GHCR_CACHE_SCOPE_WORKER }}-pr
          cache-to: type=gha,mode=max,scope=${{ env.GHCR_CACHE_SCOPE_WORKER }}-pr

  security-audit:
    name: Security audit
    needs: [changes]
    if: needs.changes.outputs.docs-only-md != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - name: Dependency audit (all deps)
        run: pnpm deps:audit

      - name: Production dependency audit
        run: pnpm deps:audit:prod

  security-secrets:
    name: Security secrets
    needs: [changes]
    if: needs.changes.outputs.docs-only-md != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Cache gitleaks binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /usr/local/bin/gitleaks
          key: gitleaks-8.30.1-${{ runner.os }}

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          if [ ! -x /usr/local/bin/gitleaks ]; then
            curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | sudo tar -xz -C /usr/local/bin gitleaks
            sudo chmod +x /usr/local/bin/gitleaks
          fi
          gitleaks version

      - name: Gitleaks (secret detection)
        run: gitleaks detect --redact --verbose --no-banner --config .gitleaks.toml

  security-sast:
    name: Security SAST
    needs: [changes]
    if: needs.changes.outputs.docs-only-md != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep SAST
        run: semgrep scan --config p/default --metrics off

  dependency-review:
    name: Dependency review
    needs: [changes]
    if: needs.changes.outputs.docs-only-md != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  actionlint:
    name: Actionlint
    needs: [changes]
    if: needs.changes.outputs.docs-only-md != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Run actionlint
        uses: rhysd/actionlint@03d0035246f3e81f36aed592ffb4bebf33a03106 # v1.7.7

  contract-property:
    name: Contract + property
    needs: [changes]
    if: needs.changes.outputs.docs-only-md != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - name: Outbound contract tests (nock, offline)
        run: pnpm test:contract

      - name: Property tests (bounded)
        env:
          FAST_CHECK_NUM_RUNS: 50
        run: pnpm test:property

  openapi-breaking:
    name: OpenAPI breaking-change
    needs: [changes]
    if: needs.changes.outputs.src-code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # docs:generate emits the spec statically (no app boot), but env validation
    # requires DATABASE_URL/REDIS_URL to be present — point them at unused
    # localhost values; no Postgres/Redis service is started (keeps PR CI fast).
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/core
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Full history so the PR base commit can be checked out for the baseline spec.
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-pnpm

      - uses: ./.github/actions/test-env

      - name: Generate head OpenAPI spec
        run: |
          pnpm docs:generate
          cp docs/openapi/openapi.json "$RUNNER_TEMP/openapi-head.json"
          # Snapshot the err-ignore file while still on the PR head — the next step
          # checks out the PR base SHA, which predates this file.
          cp .github/oasdiff/breaking-changes-ignore.txt "$RUNNER_TEMP/breaking-ignore.txt"

      - name: Generate base OpenAPI spec
        run: |
          git checkout --force "${{ github.event.pull_request.base.sha }}"
          pnpm install --frozen-lockfile
          pnpm docs:generate
          cp docs/openapi/openapi.json "$RUNNER_TEMP/openapi-base.json"

      - name: Install oasdiff (pinned + checksum-verified)
        env:
          OASDIFF_VERSION: 1.18.1
          OASDIFF_SHA256: 5174ba660d559684e67e8ab44ca6d45919114f8c57de5a1e32b91d4e5347705d
        run: |
          set -euo pipefail
          url="https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz"
          curl -sSfL "$url" -o "$RUNNER_TEMP/oasdiff.tar.gz"
          echo "${OASDIFF_SHA256}  $RUNNER_TEMP/oasdiff.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/oasdiff.tar.gz" -C "$RUNNER_TEMP" oasdiff
          "$RUNNER_TEMP/oasdiff" --version

      - name: Detect breaking API changes (oasdiff)
        # Run the pinned binary directly (the Docker action remaps RUNNER_TEMP to a
        # different in-container path). Fail only on ERR-severity breaking changes
        # (removed/renamed operations, newly required inputs, removed response fields);
        # additive/WARN changes pass. --err-ignore carries breaking changes explicitly
        # accepted for major promotions (see .github/oasdiff/breaking-changes-ignore.txt);
        # unlisted breaks still fail the gate.
        run: |
          set -euo pipefail
          "$RUNNER_TEMP/oasdiff" breaking \
            "$RUNNER_TEMP/openapi-base.json" \
            "$RUNNER_TEMP/openapi-head.json" \
            --fail-on ERR \
            --err-ignore "$RUNNER_TEMP/breaking-ignore.txt"
