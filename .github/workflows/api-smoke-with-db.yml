name: Reusable — API smoke with Postgres and Redis

on:
  workflow_call:

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17.10-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: core
          POSTGRES_PASSWORD: core
          POSTGRES_DB: core
        options: >-
          --health-cmd="pg_isready -U core -d core"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:8.6.3-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      NODE_ENV: test
      LOG_LEVEL: warn
      HOST: 0.0.0.0
      PORT: 3000
