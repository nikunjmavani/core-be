name: Mutation testing (Stryker)

on:
  schedule:
    - cron: '30 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutation-testing
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

jobs:
  stryker:
    name: Stryker mutation score
    runs-on: ubuntu-latest
    timeout-minutes: 90

    # Stryker's dry run executes the mutated files' unit tests, which boot the
    # app stack and touch Postgres + Redis (e.g. i18n.middleware locale cache).
    # Without these services the dry run fails with "Connection is closed" before
    # any mutant is scored.
    services:
      postgres:
        image: postgres:17.10-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: core
          POSTGRES_PASSWORD: core
          POSTGRES_DB: core
        options: >-
          --health-cmd="pg_isready -U core -d core"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:8.6.3-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      NODE_ENV: development
      LOG_LEVEL: warn
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://core:core@localhost:5432/core
      REDIS_URL: redis://localhost:6379
      DATABASE_SSL_ENABLED: 'false'
      RATE_LIMIT_MAX: 1000
      RATE_LIMIT_WINDOW_MS: 60000
      RUN_DB_TESTS: 1
      RUN_REDIS_TESTS: 1

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Export shared CI test env (JWT keys + retention + secrets-encryption)
        uses: ./.github/actions/test-env

      - name: Run migrations
        run: pnpm db:migrate

      - name: Run mutation tests
        run: pnpm test:mutation

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: stryker-mutation-report
          path: |
            reports/mutation/mutation-report.html
            reports/mutation/mutation-report.json
          retention-days: 14
