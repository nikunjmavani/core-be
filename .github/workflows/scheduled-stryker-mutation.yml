name: Mutation testing (Stryker)

on:
  schedule:
    - cron: '30 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutation-testing
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

jobs:
  stryker:
    name: Stryker mutation score
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run mutation tests
        run: pnpm test:mutation

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: stryker-mutation-report
          path: |
            reports/mutation/mutation-report.html
            reports/mutation/mutation-report.json
          retention-days: 14
