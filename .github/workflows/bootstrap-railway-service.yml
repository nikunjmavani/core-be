name: Bootstrap Railway service

# One-time (or recovery) Railway service bootstrap for an environment.
# Idempotent: re-running against an already-configured environment is safe.
# Steady-state CD remains in post-merge-ci → reusable-railway-deploy (SHA-pinned).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment / Railway target
        required: true
        type: choice
        options:
          - development
          - production
      service:
        description: Railway service(s) to bootstrap
        required: true
        type: choice
        options:
          - api
          - worker
          - both
      dry_run:
        description: Preview only (skip setup:infra apply and deploy)
        required: false
        type: boolean
        default: true

concurrency:
  group: bootstrap-railway-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

jobs:
  bootstrap:
    name: Bootstrap (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ inputs.environment }}
    env:
      ENVIRONMENT: ${{ inputs.environment }}
      BOOTSTRAP_SERVICE: ${{ inputs.service }}
      GH_SECRETS_JSON: ${{ toJSON(secrets) }}
      GH_VARS_JSON: ${{ toJSON(vars) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup project identity
        uses: ./.github/actions/setup-project-identity

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      # The setup:infra provisioning tool lives in the standalone core-infra repo. Check it out
      # alongside core-be and run it against this checkout via CORE_BE_DIR. Override the repo/ref
      # with the CORE_INFRA_REPO / CORE_INFRA_REF vars and CORE_INFRA_TOKEN secret when needed.
      - name: Checkout core-infra (provisioning tool)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ vars.CORE_INFRA_REPO || format('{0}/core-infra', github.repository_owner) }}
          ref: ${{ vars.CORE_INFRA_REF || 'main' }}
          token: ${{ secrets.CORE_INFRA_TOKEN || github.token }}
          path: core-infra
          fetch-depth: 1

      - name: Install core-infra deps
        run: pnpm --dir core-infra install --frozen-lockfile

      - name: Export GitHub Environment to runner
        run: |
          set -euo pipefail
          jq -nrj \
            --argjson vars "$GH_VARS_JSON" \
            --argjson secrets "$GH_SECRETS_JSON" \
            '($vars + $secrets)
              | to_entries
              | map(select(.value != null and .value != ""))
              | .[]
              | "\(.key)=\(.value)\u0000"' \
          | while IFS= read -r -d '' kv; do
              key="${kv%%=*}"
              value="${kv#*=}"
              delimiter="GHENV_$(openssl rand -hex 8)"
              {
                printf '%s<<%s\n' "$key" "$delimiter"
                printf '%s\n' "$value"
                printf '%s\n' "$delimiter"
              } >> "$GITHUB_ENV"
            done

      - name: Railway infra status
        env:
          CORE_BE_DIR: ${{ github.workspace }}
        run: pnpm --dir core-infra setup:infra:status

      - name: Railway infra dry-run
        env:
          CORE_BE_DIR: ${{ github.workspace }}
        run: pnpm --dir core-infra setup:infra:plan

      - name: Apply Railway infra (non-dry-run only)
        if: inputs.dry_run != true
        env:
          CORE_BE_DIR: ${{ github.workspace }}
        run: pnpm --dir core-infra setup:infra -- --yes

      - name: Deploy selected services
        if: inputs.dry_run != true
        env:
          RAILWAY_GIT_COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          API_IMAGE="ghcr.io/${{ github.repository }}/${{ env.API_IMAGE }}:${RAILWAY_GIT_COMMIT_SHA}"
          WORKER_IMAGE="ghcr.io/${{ github.repository }}/${{ env.WORKER_IMAGE }}:${RAILWAY_GIT_COMMIT_SHA}"
          deploy_one() {
            local service_id="$1"
            local image="$2"
            local label="$3"
            pnpm --dir "${GITHUB_WORKSPACE}/core-infra" tool:railway-deploy-image \
              --service "$service_id" \
              --image "$image" \
              --label "$label"
          }
          case "${BOOTSTRAP_SERVICE}" in
            api)
              deploy_one "$RAILWAY_SERVICE_ID" "$API_IMAGE" "api"
              ;;
            worker)
              deploy_one "$RAILWAY_WORKER_SERVICE_ID" "$WORKER_IMAGE" "worker"
              ;;
            both)
              deploy_one "$RAILWAY_SERVICE_ID" "$API_IMAGE" "api"
              deploy_one "$RAILWAY_WORKER_SERVICE_ID" "$WORKER_IMAGE" "worker"
              ;;
            *)
              echo "::error::Unsupported service selection: ${BOOTSTRAP_SERVICE}"
              exit 1
              ;;
          esac

      - name: Bootstrap summary
        run: |
          {
            echo "## Railway bootstrap summary"
            echo ""
            echo "| Field | Value |"
            echo "| ----- | ----- |"
            echo "| Environment | ${ENVIRONMENT} |"
            echo "| Service selection | ${BOOTSTRAP_SERVICE} |"
            echo "| Dry run | ${{ inputs.dry_run }} |"
            echo "| Commit SHA | ${RAILWAY_GIT_COMMIT_SHA:-n/a (dry-run)} |"
          } >> "$GITHUB_STEP_SUMMARY"
