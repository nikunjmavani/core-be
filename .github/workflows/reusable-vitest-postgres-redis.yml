name: Reusable — test with Postgres and Redis

# Two modes (selected by caller via `mode` input):
#
#   full  (default)  — runs the complete matrix split into 4 shards:
#                       1) fast              (unit + property + global)
#                       2) db-tenancy-billing (e2e for tenancy + billing + their integration)
#                       3) db-auth-user      (e2e for auth + user + their integration)
#                       4) db-rest           (e2e for notify + audit + upload + unit-db + remaining integration + security + performance)
#                      Used when a PR/push touches anything outside src/domains/ (infra,
#                      shared, migrations, lockfile, Dockerfiles, vitest configs).
#
#   smart            — runs only the fast shard + a single db-bound shard that uses
#                      `vitest --changed=origin/${BASE_REF}` so test selection is driven
#                      by the import graph rather than path filters. Caller passes
#                      `base-ref` so vitest knows where the PR branched from.
#                      Used when the PR's diff is confined to src/domains/ (a "safe
#                      domain scope") — the fast shard, api-smoke, and quality jobs
#                      stay as the cross-cutting safety net.

on:
  workflow_call:
    inputs:
      mode:
        description: Test selection mode — "full" or "smart"
        required: false
        type: string
        default: full
      base-ref:
        description: Base ref for `vitest --changed` in smart mode (e.g. "main")
        required: false
        type: string
        default: ''
    secrets:
      RESEND_API_KEY:
        required: false
      TEST_REPORT_EMAIL_TO:
        required: false

permissions:
  contents: read

jobs:
  matrix-config:
    name: Matrix
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.config.outputs.shards }}
    steps:
      - name: Pick matrix for mode=${{ inputs.mode }}
        id: config
        run: |
          set -euo pipefail
          if [ "${{ inputs.mode }}" = "smart" ]; then
            # Smart mode: fast shard (full breadth) + a single db-bound shard driven
            # by `vitest --changed`. We still execute every db-bound project so the
            # import graph can pick up tests in any tier; --changed filters them.
            shards_compact='[{"name":"unit + property + global","id":"fast","projects":"--project unit --project property --project global","domain_filter":"","use_changed":false},{"name":"db (changed)","id":"db-smart","projects":"--project unit-db --project e2e --project integration --project security --project performance","domain_filter":"","use_changed":true}]'
          else
            shards_compact='[{"name":"unit + property + global","id":"fast","projects":"--project unit --project property --project global","domain_filter":"","use_changed":false},{"name":"tenancy + billing","id":"db-tenancy-billing","projects":"--project e2e --project integration","domain_filter":"tenancy,billing","use_changed":false},{"name":"auth + user","id":"db-auth-user","projects":"--project e2e --project integration","domain_filter":"auth,user","use_changed":false},{"name":"notify + audit + upload","id":"db-rest","projects":"--project unit-db --project e2e --project integration --project security --project performance","domain_filter":"notify,audit,upload,rest","use_changed":false}]'
          fi
          echo "shards=${shards_compact}" >> "$GITHUB_OUTPUT"
          echo "Selected shards:"
          jq . <<<"${shards_compact}"

  run:
    name: ${{ matrix.shard.name }}
    needs: matrix-config
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.matrix-config.outputs.shards) }}

    services:
      postgres:
        image: postgres:17.10-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: core
          POSTGRES_PASSWORD: core
          POSTGRES_DB: core
        options: >-
          --health-cmd="pg_isready -U core -d core"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:8.6.3-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      NODE_ENV: test
      LOG_LEVEL: warn
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://core:core@localhost:5432/core
      REDIS_URL: redis://localhost:6379
      DATABASE_SSL_ENABLED: 'false'
      RATE_LIMIT_MAX: 1000
      RATE_LIMIT_WINDOW_MS: 60000
      RUN_DB_TESTS: 1
      RUN_REDIS_TESTS: 1
      ENABLE_MCP_SERVER: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Export shared CI test env (JWT keys + retention + secrets-encryption)
        uses: ./.github/actions/test-env

      - name: Fetch base ref for `vitest --changed`
        if: matrix.shard.use_changed && inputs.base-ref != ''
        run: git fetch origin ${{ inputs.base-ref }} --depth=1

      - name: Run migrations
        run: pnpm db:migrate

      - name: Generate OpenAPI artifact for global tests
        if: matrix.shard.id == 'fast'
        run: pnpm docs:generate

      - name: Run ${{ matrix.shard.id }} test shard with coverage
        id: run-tests
        env:
          VITEST_DOMAIN_FILTER: ${{ matrix.shard.domain_filter }}
        run: |
          set -euo pipefail
          CHANGED_ARG=""
          if [ "${{ matrix.shard.use_changed }}" = "true" ] && [ -n "${{ inputs.base-ref }}" ]; then
            CHANGED_ARG="--changed origin/${{ inputs.base-ref }}"
            echo "Smart mode: running with ${CHANGED_ARG}"
          fi
          # `--passWithNoTests` lets domain-filtered shards exit cleanly when no
          # matching test files exist (e.g. db-tenancy-billing shard on a PR that
          # only touched docs in tenancy).
          pnpm exec vitest run \
            --coverage \
            --coverage.thresholds.lines=0 \
            --coverage.thresholds.functions=0 \
            --coverage.thresholds.statements=0 \
            --coverage.thresholds.branches=0 \
            --passWithNoTests \
            ${{ matrix.shard.projects }} \
            ${CHANGED_ARG}

      - name: Rename coverage report for shard
        if: always() && hashFiles('coverage/**') != ''
        run: mv coverage "coverage-${{ matrix.shard.id }}"

      - name: Upload coverage artifact
        if: always() && hashFiles(format('coverage-{0}/**', matrix.shard.id)) != ''
        uses: actions/upload-artifact@v5
        with:
          name: coverage-${{ matrix.shard.id }}
          path: coverage-${{ matrix.shard.id }}/
          retention-days: 14

      - name: Send test result email
        if: always() && env.RESEND_API_KEY != '' && env.TEST_REPORT_EMAIL_TO != ''
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_REPORT_EMAIL_TO: ${{ secrets.TEST_REPORT_EMAIL_TO }}
          TEST_STATUS: ${{ steps.run-tests.outcome }}
          TEST_SHARD: ${{ matrix.shard.id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: pnpm tool:test-report-email

  coverage-gate:
    name: Coverage
    needs: run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all shard coverage artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: coverage-*
          path: coverage-shards
          merge-multiple: false

      - name: Merge coverage and check thresholds
        # Thresholds come from tooling/ci/coverage-thresholds.json — same source
        # vitest.config.ts uses, so local and CI gates stay in lockstep.
        # The merger accepts any number of coverage-final.json paths, so this
        # naturally adapts to the smart mode (2 shards) vs full mode (4 shards).
        run: |
          set -euo pipefail
          shopt -s nullglob
          inputs=()
          for shard_dir in coverage-shards/coverage-*; do
            if [ -f "${shard_dir}/coverage-final.json" ]; then
              inputs+=("${shard_dir}/coverage-final.json")
            fi
          done
          if [ "${#inputs[@]}" -eq 0 ]; then
            echo "::warning::No shard coverage artifacts found — skipping merged gate."
            exit 0
          fi
          node tooling/ci/merge-coverage-and-check-thresholds.mjs \
            "${inputs[@]}" \
            --output coverage-merged/coverage-final.json

      - name: Upload merged coverage artifact
        if: always() && hashFiles('coverage-merged/**') != ''
        uses: actions/upload-artifact@v5
        with:
          name: coverage-merged
          path: coverage-merged/
          retention-days: 14
