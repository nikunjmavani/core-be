name: Reusable — chaos via Toxiproxy

on:
  workflow_call:
    inputs:
      merge_commit_sha:
        description: Commit SHA on the target branch after merge
        required: true
        type: string
      target_branch:
        description: Protected branch that received the merge (main)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      merge_commit_sha:
        description: Commit SHA to test
        required: false
        type: string
        default: ''
      target_branch:
        description: Branch context (main)
        required: true
        type: choice
        options:
          - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

jobs:
  run:
    name: Toxiproxy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:17.10-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: core
        options: >-
          --health-cmd="pg_isready -U postgres -d core"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:8.6.3-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

      toxiproxy:
        image: ghcr.io/shopify/toxiproxy:2.12.0
        ports:
          - 8474:8474
          - 25432:25432
          - 26379:26379

    env:
      NODE_ENV: development
      LOG_LEVEL: warn
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:25432/core
      REDIS_URL: redis://localhost:26379
      FRONTEND_URL: http://localhost:3000
      RUN_DB_TESTS: 1
      RUN_REDIS_TESTS: 1
      ENABLE_MCP_SERVER: 'true'
      TOXIPROXY_URL: http://127.0.0.1:8474
      CHAOS_TOXIPROXY_POSTGRES_UPSTREAM: postgres:5432
      CHAOS_TOXIPROXY_REDIS_UPSTREAM: redis:6379

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.merge_commit_sha || github.sha }}

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Export shared CI test env (JWT keys + retention + secrets-encryption)
        uses: ./.github/actions/test-env
        with:
          rate-limit-max: '1000'
          rate-limit-window-ms: '60000'

      - name: Provision chaos Toxiproxy listeners
        run: pnpm chaos:provision

      - name: Run migrations through chaos listeners
        run: pnpm db:migrate

      - name: Run chaos failure-injection suite
        run: pnpm test:chaos
