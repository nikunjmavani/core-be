# Validates commit messages on main/dev/qa so squash-merge and direct-push commits stay conventional.
# See commitlint.config.cjs and .husky/commit-msg.

name: Commitlint

on:
  push:
    branches: [main, dev, qa]

permissions:
  contents: read

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Validate commit messages
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            FIRST="$(git rev-list --max-parents=0 HEAD)"
            pnpm exec commitlint --from "$FIRST" --to "$AFTER" --verbose
          else
            pnpm exec commitlint --from "$BEFORE" --to "$AFTER" --verbose
          fi
