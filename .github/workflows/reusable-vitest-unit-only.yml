name: Reusable — Vitest unit (no DB)

# Fast PR lane: unit + global Vitest projects with import-graph selection via
# `--changed`. No Postgres/Redis services and no migrations.

on:
  workflow_call:
    inputs:
      base-ref:
        description: Base branch for `vitest --changed` (e.g. dev or main)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      base-ref:
        description: Base branch for `vitest --changed`
        required: true
        type: string
        default: dev

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

jobs:
  run:
    name: Unit + global
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      redis:
        image: redis:8.6.3-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      VITEST_SKIP_DATABASE: 'true'
      NODE_ENV: test
      LOG_LEVEL: warn
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/core
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Export shared CI test env
        uses: ./.github/actions/test-env

      - name: Cache Vitest
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: node_modules/.vitest
          key: vitest-unit-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tooling/vitest/**') }}
          restore-keys: |
            vitest-unit-${{ runner.os }}-

      - name: Fetch base ref for `vitest --changed`
        run: git fetch origin ${{ inputs.base-ref }} --depth=1

      - name: Generate OpenAPI artifact for global tests
        run: pnpm docs:generate

      - name: Run unit + global tests (changed)
        run: |
          set -euo pipefail
          pnpm exec vitest run \
            --project unit \
            --project global \
            --changed "origin/${{ inputs.base-ref }}" \
            --passWithNoTests
