# Auto-merge policy for Dependabot PRs after CI succeeds.
# - Production: patch only
# - Development: patch + minor (never major)
# - Security alerts: patch + minor

name: Dependabot

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: Auto-merge
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Dependabot PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          pr_number="$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")"
          if [ -z "$pr_number" ]; then
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
            echo "reason=workflow_run payload did not include a pull request" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          author_login="$(gh pr view "$pr_number" --json author --jq '.author.login')"
          if [ "$author_login" != "app/dependabot" ] && [ "$author_login" != "dependabot[bot]" ]; then
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
            echo "reason=PR author is not Dependabot: $author_login" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_url="$(gh pr view "$pr_number" --json url --jq '.url')"
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Classify update safety
        id: policy
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail

          metadata_file="$(mktemp)"
          gh pr view "$PR_NUMBER" --json title,body,labels,files,baseRefName > "$metadata_file"

          node - "$metadata_file" "$GITHUB_OUTPUT" <<'NODE'
          const { readFileSync, appendFileSync } = require('node:fs');

          const metadataPath = process.argv[2];
          const outputPath = process.argv[3];
          const metadata = JSON.parse(readFileSync(metadataPath, 'utf8'));

          const title = metadata.title ?? '';
          const body = metadata.body ?? '';
          const text = `${title}\n${body}`;
          const labels = new Set((metadata.labels ?? []).map((label) => label.name));
          const files = new Set((metadata.files ?? []).map((file) => file.path));

          const versionMatches = [...text.matchAll(/\bfrom\s+v?(\d+)\.(\d+)\.(\d+)\s+to\s+v?(\d+)\.(\d+)\.(\d+)\b/gi)];
          const rank = { patch: 1, minor: 2, major: 3 };
          let updateType = '';

          for (const match of versionMatches) {
            const [, oldMajor, oldMinor, oldPatch, newMajor, newMinor, newPatch] = match.map(Number);
            const currentType =
              oldMajor !== newMajor ? 'major' : oldMinor !== newMinor ? 'minor' : oldPatch !== newPatch ? 'patch' : '';
            if (currentType && (!updateType || rank[currentType] > rank[updateType])) {
              updateType = currentType;
            }
          }

          const lowerText = text.toLowerCase();
          const isSecurityUpdate =
            labels.has('security') ||
            lowerText.includes('security update') ||
            lowerText.includes('security-updates group');
          const isDevelopmentUpdate = lowerText.includes('dev-dependencies group');
          const isProductionUpdate =
            lowerText.includes('production-minor-and-patch group') ||
            lowerText.includes('production-major group') ||
            files.has('package.json') ||
            files.has('pnpm-lock.yaml');

          let shouldMerge = false;
          let reason = 'update is outside the safe auto-merge policy';

          if (!updateType) {
            reason = 'could not determine semantic version update type';
          } else if (updateType === 'patch') {
            shouldMerge = true;
            reason = 'patch update';
          } else if (updateType === 'minor' && isDevelopmentUpdate) {
            shouldMerge = true;
            reason = 'development dependency minor update';
          } else if (updateType === 'minor' && isSecurityUpdate) {
            shouldMerge = true;
            reason = 'security minor update';
          } else if (isProductionUpdate) {
            reason = `production ${updateType} update is not auto-merged`;
          }

          appendFileSync(outputPath, `should_merge=${shouldMerge}\n`);
          appendFileSync(outputPath, `reason=${reason}\n`);
          appendFileSync(outputPath, `update_type=${updateType || 'unknown'}\n`);
          NODE

      - name: Enable auto-merge for safe updates
        if: steps.policy.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: gh pr merge --auto --squash "$PR_URL"

      - name: Report skipped update
        if: steps.policy.outputs.should_merge != 'true'
        run: |
          echo "Dependabot auto-merge skipped: ${{ steps.policy.outputs.reason }}"
