name: Reusable — test with Postgres and Redis

on:
  workflow_call:
    secrets:
      RESEND_API_KEY:
        required: false
      TEST_REPORT_EMAIL_TO:
        required: false

permissions:
  contents: read

jobs:
  run:
    name: ${{ matrix.shard.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Two parallel shards run on separate GitHub runners — each owns its own
        # Postgres + Redis service. Wall-clock CI time = max(fast, db-bound).
        shard:
          - name: tests-fast (unit + property + global)
            id: fast
            projects: '--project unit --project property --project global'
          - name: tests-db-bound (unit-db + e2e + integration + security + performance)
            id: db-bound
            projects: '--project unit-db --project e2e --project integration --project security --project performance'

    services:
      postgres:
        image: postgres:17.10-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: core
          POSTGRES_PASSWORD: core
          POSTGRES_DB: core
        options: >-
          --health-cmd="pg_isready -U core -d core"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:8.6.3-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      NODE_ENV: test
      LOG_LEVEL: warn
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://core:core@localhost:5432/core
      REDIS_URL: redis://localhost:6379
