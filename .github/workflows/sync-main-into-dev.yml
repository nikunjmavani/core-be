# Keeps dev from lagging production-only fixes, especially urgent security fixes
# that land directly on main through Dependabot security PRs.
name: Sync main into dev

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-main-into-dev
  cancel-in-progress: false

jobs:
  open-sync-pr:
    name: Open sync PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SYNC_BRANCH: automation/sync-main-into-dev
      # Prefer the existing PAT so the generated PR triggers downstream CI.
      # Fall back to GITHUB_TOKEN for repositories that do not configure it.
      GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Open main to dev sync PR
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main dev

          if git merge-base --is-ancestor origin/main origin/dev; then
            echo "dev already contains main; no sync PR needed."
            exit 0
          fi

          git switch --force-create "$SYNC_BRANCH" origin/dev

          if ! git merge --no-edit origin/main; then
            echo "::error::Automatic main -> dev merge conflicted. Resolve manually by opening a PR from main into dev."
            exit 1
          fi

          git push --force-with-lease origin "$SYNC_BRANCH"

          existing_pr="$(
            gh pr list \
              --base dev \
              --head "$SYNC_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"

          body_file="$(mktemp)"
          cat > "$body_file" <<'EOF'
          ## Summary

          - Syncs `main` back into `dev` so production-only fixes, including urgent security fixes, stay in the development branch.
          - Generated automatically after a push to `main`.

          ## Test plan

          - [ ] CI green on this PR.
          - [ ] Resolve merge conflicts manually if GitHub reports any after the branch is updated.

          EOF

          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" \
              --title "chore: sync main into dev" \
              --body-file "$body_file"
            echo "Updated existing sync PR #$existing_pr"
          else
            gh pr create \
              --base dev \
              --head "$SYNC_BRANCH" \
              --title "chore: sync main into dev" \
              --body-file "$body_file"
          fi
