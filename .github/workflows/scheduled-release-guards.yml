# Release-flow guards — scheduled canaries that catch release-cycle drift while it
# is still a notification, not a blocked release (all of these bit the 4.8.0 release).
# Single-trunk model: the branch-ancestry guard is retired (no dev → main promotion
# or back-merge exists anymore — main is the only long-lived branch).
#   1. GitHub environment protection drift (weekly): the committed
#      `.github/environments/*.json` must match the GitHub UI, and every committed
#      `.github/rulesets/*.json` must have a live, active ruleset counterpart. The
#      Railway deploy validates environment protection as a pre-flight and refuses
#      to deploy on drift, so catching it here turns a failed production deploy
#      into a Monday notification.
#   2. RELEASE_PLEASE_TOKEN canary (weekly): probes the development environment's
#      PAT copy for expiry. Rotation (`pnpm github:sync`) updates both environment
#      copies together, so the unprotected development copy is a usable canary for
#      the production copy — which cannot be probed on a schedule without tripping
#      the production required-reviewer gate every week. The production copy is
#      additionally verified at use time by the tripwire step in post-merge-ci's
#      release-please job.

name: Release-flow guards

on:
  schedule:
    - cron: '30 6 * * 1' # weekly (Monday) — environment protection drift + PAT canary
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

permissions:
  contents: read

concurrency:
  group: release-flow-guards
  cancel-in-progress: false

jobs:
  environment-drift:
    name: GitHub environment protection drift
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 6 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install: 'false'

      # Same pattern as reusable-railway-deploy.yml: the validator lives in the
      # standalone core-infra repo and reads this checkout via CORE_BE_DIR.
      - name: Checkout core-infra (provisioning tool)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ vars.CORE_INFRA_REPO || format('{0}/core-infra', github.repository_owner) }}
          ref: ${{ vars.CORE_INFRA_REF || 'main' }}
          token: ${{ secrets.CORE_INFRA_TOKEN || github.token }}
          path: core-infra
          fetch-depth: 1

      - name: Install core-infra deps
        run: pnpm --dir core-infra install --frozen-lockfile

      - name: Validate GitHub environment protection (config vs UI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}
          CORE_BE_DIR: ${{ github.workspace }}
        run: pnpm --dir core-infra validate:github-environments

      - name: Verify committed rulesets are live and active
        # `.github/rulesets/*.json` is the committed source of truth for branch
        # protection; a deleted or disabled live ruleset silently removes the
        # merge gates (required checks, merge-method lock, review rules).
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api "repos/${GH_REPOSITORY}/rulesets" --paginate \
            --jq '[.[] | {name, enforcement}]' > /tmp/live-rulesets.json
          failures=0
          for ruleset_file in .github/rulesets/*.json; do
            name="$(jq -r '.name' "$ruleset_file")"
            live_enforcement="$(jq -r --arg n "$name" \
              '[.[] | select(.name == $n) | .enforcement][0] // "absent"' /tmp/live-rulesets.json)"
            if [ "$live_enforcement" != "active" ]; then
              echo "::error::Committed ruleset '${name}' (${ruleset_file}) is not live+active on GitHub (live state: ${live_enforcement}). Re-apply it via pnpm github:sync or the repo Rules settings."
              failures=$((failures + 1))
            else
              echo "OK: ruleset '${name}' is live and active."
            fi
          done
          [ "$failures" -eq 0 ]

  release-token:
    name: RELEASE_PLEASE_TOKEN canary (development copy)
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 6 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # The development environment has no protection rules, so a scheduled job can
    # read its secrets without an approval prompt (production's copy would require
    # the reviewer gate weekly; it is covered at use time in post-merge-ci).
    environment: development
    steps:
      - name: Probe RELEASE_PLEASE_TOKEN for expiry
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_PLEASE_TOKEN:-}" ]; then
            echo "::error::RELEASE_PLEASE_TOKEN is not set in the development environment — release automation is silently degraded (Releases/tags cannot be created)."
            exit 1
          fi
          # Dump the response headers: a fine-grained PAT returns its expiry in the
          # `github-authentication-token-expiration` header on any authenticated
          # request, so we can warn a fortnight BEFORE it lapses — instead of only
          # discovering it dead (401) on the day a release needs it.
          status="$(curl -sS -D /tmp/pat-headers -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${RELEASE_PLEASE_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GH_REPOSITORY}" || echo 000)"
          if [ "$status" = "401" ]; then
            echo "::error::RELEASE_PLEASE_TOKEN (development copy) is expired or revoked. Rotate the PAT and update BOTH environment copies (pnpm github:sync) before the next release needs it."
            exit 1
          fi
          if [ "$status" != "200" ]; then
            echo "::warning title=RELEASE_PLEASE_TOKEN probe inconclusive::GitHub API returned HTTP ${status} (transient?). Not failing the canary."
            exit 0
          fi
          # Classic / non-expiring PATs omit the header — nothing to warn about.
          expiry="$(grep -i '^github-authentication-token-expiration:' /tmp/pat-headers \
            | sed -E 's/^[^:]+:[[:space:]]*//; s/[[:space:]]*$//' || true)"
          if [ -z "$expiry" ]; then
            echo "RELEASE_PLEASE_TOKEN valid (HTTP 200); no expiry header (classic or non-expiring PAT)."
            exit 0
          fi
          expiry_epoch="$(date -u -d "$expiry" +%s 2>/dev/null || echo 0)"
          now_epoch="$(date -u +%s)"
          if [ "$expiry_epoch" -gt 0 ]; then
            days_left=$(( (expiry_epoch - now_epoch) / 86400 ))
            echo "RELEASE_PLEASE_TOKEN valid; expires ${expiry} (${days_left} days left)."
            if [ "$days_left" -lt 14 ]; then
              echo "::warning title=RELEASE_PLEASE_TOKEN expiring soon::The PAT expires in ${days_left} day(s) (${expiry}). Rotate it and update BOTH environment copies (pnpm github:sync) before it lapses to avoid a stuck release."
            fi
          else
            echo "RELEASE_PLEASE_TOKEN valid; expiry header present but unparseable: ${expiry}"
          fi

  notify-failure:
    name: Notify failure
    needs: [environment-drift, release-token]
    if: |
      always() &&
      (needs.environment-drift.result == 'failure' || needs.release-token.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update ci-failure issue
        # A failed guard on a schedule is invisible unless someone checks the
        # Actions tab; an issue produces a real notification. One open issue per
        # guard collects repeats as comments; closing it acknowledges the drift.
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          DRIFT_RESULT: ${{ needs.environment-drift.result }}
          TOKEN_RESULT: ${{ needs.release-token.result }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh label create ci-failure --repo "$GH_REPOSITORY" \
            --color D93F0B --description "Automated post-merge/guard failure notification" \
            2>/dev/null || true
          title="Release-flow guard failing"
          body="$(printf '%s\n' \
            "Run: ${WORKFLOW_URL}" \
            "" \
            "| guard | result |" \
            "| --- | --- |" \
            "| environment/ruleset drift | ${DRIFT_RESULT} |" \
            "| RELEASE_PLEASE_TOKEN canary | ${TOKEN_RESULT} |" \
            "" \
            "Drift red → align GitHub environment settings with .github/environments/*.json and re-apply .github/rulesets/*.json." \
            "Token red → rotate the RELEASE_PLEASE_TOKEN PAT and update both environment copies (pnpm github:sync)." \
            "" \
            "Close this issue once the guard is green again.")"
          existing="$(gh issue list --repo "$GH_REPOSITORY" --state open --label ci-failure \
            --search "in:title \"${title}\"" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GH_REPOSITORY" --body "$body"
            echo "Commented on existing ci-failure issue #${existing}."
          else
            gh issue create --repo "$GH_REPOSITORY" --title "$title" --label ci-failure --body "$body"
          fi
