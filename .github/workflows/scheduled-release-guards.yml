# Release-flow guards — scheduled canaries that catch release-cycle drift while it
# is still a notification, not a blocked release (both bit the 4.8.0 release):
#   1. Branch ancestry (daily): `main` must be an ancestor of `dev`. A failed or
#      missed post-release back-merge silently diverges the branches; the next
#      dev → main promote then needs a manual ancestry-repair PR. Fix by merging
#      the open `release/backmerge-v*` PR or re-running "Post-release back-merge".
#   2. GitHub environment protection + branch ruleset drift (weekly): the
#      committed `.github/environments/*.json` must match the GitHub UI (the
#      Railway deploy validates this as a pre-flight and refuses to deploy on
#      drift, so catching it here turns a failed production deploy into a Monday
#      notification), and every committed `.github/rulesets/*.json` must still
#      EXIST on the remote (presence check — a deleted/renamed "Protect main"
#      ruleset becomes a Monday ping instead of an unprotected branch).

name: Release-flow guards

on:
  schedule:
    - cron: '30 5 * * *' # daily — branch ancestry
    - cron: '30 6 * * 1' # weekly (Monday) — environment protection drift
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

permissions:
  contents: read

concurrency:
  group: release-flow-guards
  cancel-in-progress: false

jobs:
  branch-ancestry:
    name: Branch ancestry (main contained in dev)
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 5 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify origin/main is an ancestor of origin/dev
        run: |
          set -euo pipefail
          git fetch origin main dev
          if git merge-base --is-ancestor origin/main origin/dev; then
            echo "OK: origin/main is contained in origin/dev — no back-merge pending."
          else
            missing_count="$(git rev-list --count origin/dev..origin/main)"
            echo "::error::origin/dev is missing ${missing_count} commit(s) from origin/main. A post-release back-merge did not complete — merge the open release/backmerge-v* PR (merge commit, never squash) or re-run the 'Post-release back-merge' workflow. Left unfixed, the next dev → main promote requires a manual ancestry-repair PR."
            git log --oneline origin/dev..origin/main | head -10
            exit 1
          fi

  environment-drift:
    name: GitHub environment + ruleset drift
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 6 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Presence-only check (name match), independent of core-infra: catches a
      # deleted or renamed ruleset. Parameter drift is validated locally via
      # core-infra tooling. Ported from core-fe.
      - name: Validate branch rulesets exist on remote (presence)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          remote_names="$(gh api "repos/${GH_REPOSITORY}/rulesets" --paginate --jq '.[].name')"
          missing=0
          for file in .github/rulesets/*.json; do
            name="$(jq -r '.name' "${file}")"
            if grep -Fxq "${name}" <<< "${remote_names}"; then
              echo "OK: ruleset '${name}' (${file}) present on remote."
            else
              echo "::error::Committed ruleset '${name}' (${file}) is missing on the remote — the branch may be unprotected. Re-sync rulesets (core-infra) or recreate it in Settings → Rules."
              missing=1
            fi
          done
          exit "${missing}"

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install: 'false'

      # Same pattern as reusable-railway-deploy.yml: the validator lives in the
      # standalone core-infra repo and reads this checkout via CORE_BE_DIR.
      - name: Checkout core-infra (provisioning tool)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ vars.CORE_INFRA_REPO || format('{0}/core-infra', github.repository_owner) }}
          ref: ${{ vars.CORE_INFRA_REF || 'main' }}
          token: ${{ secrets.CORE_INFRA_TOKEN || github.token }}
          path: core-infra
          fetch-depth: 1

      - name: Install core-infra deps
        run: pnpm --dir core-infra install --frozen-lockfile

      - name: Validate GitHub environment protection (config vs UI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}
          CORE_BE_DIR: ${{ github.workspace }}
        run: pnpm --dir core-infra validate:github-environments

  notify-failure:
    name: Notify failure
    needs: [branch-ancestry, environment-drift]
    if: |
      always() &&
      (needs.branch-ancestry.result == 'failure' || needs.environment-drift.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update ci-failure issue
        # A failed guard on a schedule is invisible unless someone checks the
        # Actions tab; an issue produces a real notification. One open issue per
        # guard collects repeats as comments; closing it acknowledges the drift.
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          ANCESTRY_RESULT: ${{ needs.branch-ancestry.result }}
          DRIFT_RESULT: ${{ needs.environment-drift.result }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh label create ci-failure --repo "$GH_REPOSITORY" \
            --color D93F0B --description "Automated post-merge/guard failure notification" \
            2>/dev/null || true
          title="Release-flow guard failing"
          body="$(printf '%s\n' \
            "Run: ${WORKFLOW_URL}" \
            "" \
            "| guard | result |" \
            "| --- | --- |" \
            "| branch ancestry (main ⊆ dev) | ${ANCESTRY_RESULT} |" \
            "| environment protection drift | ${DRIFT_RESULT} |" \
            "" \
            "Ancestry red → merge the open release/backmerge-v* PR or re-run the Post-release back-merge workflow." \
            "Drift red → align GitHub environment settings with .github/environments/*.json." \
            "" \
            "Close this issue once the guard is green again.")"
          existing="$(gh issue list --repo "$GH_REPOSITORY" --state open --label ci-failure \
            --search "in:title \"${title}\"" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GH_REPOSITORY" --body "$body"
            echo "Commented on existing ci-failure issue #${existing}."
          else
            gh issue create --repo "$GH_REPOSITORY" --title "$title" --label ci-failure --body "$body"
          fi
