# Reusable Railway deploy (called from post-merge-ci.yml) or manual workflow_dispatch.
# Gate sequence: migrate → deploy API/worker → API /health → worker /health → API smoke.
# When post-deploy API smoke succeeds, the environment is fully live for traffic.
#
# API and worker are deployed by `pnpm tool:railway-deploy-image`
# (tooling/setup/railway/deploy-image.ts), which goes straight to the Railway
# GraphQL API:
#   1. serviceInstanceUpdate { source: { image: <ghcr-ref> } }
#   2. serviceInstanceDeployV2(serviceId, environmentId)
#   3. poll deployment(id) until terminal status (SUCCESS / FAILED / CRASHED)
#
# This is the only reliable way to deploy a freshly built GHCR image. The
# Railway CLI's deploy paths are unsuitable: the in-place refresh command
# re-runs the previous deployment object with its existing image tag (so it
# silently serves the OLD image), and the source-upload command pushes the
# runner's checked-out source for Railway to build (so it bypasses the
# scanned GHCR image entirely). The CLI also has no `--image` flag. See
# tooling/setup/railway/deploy-image.ts for the GraphQL details.
#
# The same code path handles both the initial bootstrap (no prior deployment)
# and steady-state redeploys, so no fallback branch is needed.

name: Reusable — Railway deploy

on:
  workflow_call:
    inputs:
      merge_commit_sha:
        description: Commit SHA on the target branch after merge (optional when invoked via workflow_dispatch)
        required: false
        type: string
      target_branch:
        description: Protected branch that received the merge (main or dev)
        required: false
        type: string
  workflow_dispatch:
    inputs:
      target:
        description: GitHub Environment to deploy
        required: true
        type: choice
        options:
          - production
          - development

concurrency:
  group: railway-deploy-${{ inputs.target_branch || github.ref_name }}-${{ inputs.merge_commit_sha || github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-environment:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.map.outputs.environment }}
    steps:
      - name: Map branch or input to environment
        # Canonical mapping (see docs/deployment/runbooks/add-new-environment.md):
        #   main → production
        #   dev  → development
        # Branch name → GitHub Environment name → NODE_ENV value must stay 1:1.
        #
        # All `${{ ... }}` are forwarded via the env: block below so they
        # arrive in the shell as opaque variables (no injection via crafted
        # branch/input names). See GitHub security hardening docs:
        # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
        id: map
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET_INPUT: ${{ inputs.target }}
          TARGET_BRANCH_INPUT: ${{ inputs.target_branch }}
          PULL_REQUEST_BASE_REF: ${{ github.event.pull_request.base.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "environment=$TARGET_INPUT" >> "$GITHUB_OUTPUT"
          elif [ -n "$TARGET_BRANCH_INPUT" ]; then
            case "$TARGET_BRANCH_INPUT" in
              main) echo "environment=production"  >> "$GITHUB_OUTPUT" ;;
              dev)  echo "environment=development" >> "$GITHUB_OUTPUT" ;;
              *)    echo "::error::Unsupported branch for deploy: $TARGET_BRANCH_INPUT" && exit 1 ;;
            esac
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            case "$PULL_REQUEST_BASE_REF" in
              main) echo "environment=production"  >> "$GITHUB_OUTPUT" ;;
              dev)  echo "environment=development" >> "$GITHUB_OUTPUT" ;;
              *)    echo "::error::Unsupported base branch for deploy: $PULL_REQUEST_BASE_REF" && exit 1 ;;
            esac
          else
            case "$REF_NAME" in
              main) echo "environment=production"  >> "$GITHUB_OUTPUT" ;;
              dev)  echo "environment=development" >> "$GITHUB_OUTPUT" ;;
              *)    echo "::error::Unsupported branch for deploy: $REF_NAME" && exit 1 ;;
            esac
          fi

  deploy:
    name: Deploy (${{ needs.resolve-environment.outputs.environment }})
    needs: resolve-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-environment.outputs.environment }}
    outputs:
      api_base_url: ${{ steps.api_health.outputs.api_base_url }}
    # Job-level env block — every step inherits these. Steps only declare an
    # `env:` block when they need something extra (e.g. db:migrate forwards
    # DATABASE_URL alongside). Defining each value once here makes the file
    # DRY: rotating a Railway token only needs one edit, not six.
    env:
      ENVIRONMENT: ${{ needs.resolve-environment.outputs.environment }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
      RAILWAY_WORKER_SERVICE_ID: ${{ secrets.RAILWAY_WORKER_SERVICE_ID }}
      RAILWAY_GIT_COMMIT_SHA: ${{ inputs.merge_commit_sha || github.sha }}
      GH_SECRETS_JSON: ${{ toJSON(secrets) }}
      GH_VARS_JSON: ${{ toJSON(vars) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.merge_commit_sha || github.sha }}

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Export GitHub Environment to runner
        # Persist every GitHub Environment secret + variable into $GITHUB_ENV
        # so EVERY subsequent step in this job sees them as real process.env
        # entries. This replaces dozens of per-step `env:` mappings: anything
        # added/removed in the GitHub Environment flows through automatically
        # with zero workflow edits.
        #
        # Why $GITHUB_ENV (not just `export`): job-level `env:` only takes
        # static expressions, and per-step `export` does not persist across
        # steps. $GITHUB_ENV is GitHub's documented mechanism for cross-step
        # env. GitHub continues to mask each secret value in logs.
        #
        # Multi-line values (e.g. JWT_PRIVATE_KEY PEM) MUST use the heredoc
        # form: `KEY<<DELIM\n...\nDELIM`. We pick a random per-key delimiter
        # so a value containing the literal "EOF" cannot escape the heredoc.
        run: |
          set -euo pipefail
          jq -nrj \
            --argjson vars "$GH_VARS_JSON" \
            --argjson secrets "$GH_SECRETS_JSON" \
            '($vars + $secrets)
              | to_entries
              | map(select(.value != null and .value != ""))
              | .[]
              | "\(.key)=\(.value)\u0000"' \
          | while IFS= read -r -d '' kv; do
              key="${kv%%=*}"
              value="${kv#*=}"
              # Always use heredoc; safe for both single- and multi-line values.
              delimiter="GHENV_$(openssl rand -hex 8)"
              {
                printf '%s<<%s\n' "$key" "$delimiter"
                printf '%s\n' "$value"
                printf '%s\n' "$delimiter"
              } >> "$GITHUB_ENV"
            done
          echo "Exported GitHub Environment to \$GITHUB_ENV for downstream steps."

      - name: Validate GitHub environment secrets
        # The validator (tooling/setup/github/validate.ts) reads required keys
        # from the Zod env schema and checks `process.env` (runtime mode).
        # Everything is already in process.env from the previous step.
        env:
          CONFIG: ${{ needs.resolve-environment.outputs.environment }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}
          GITHUB_ENV_VALIDATION_SOURCE: runtime
        run: pnpm validate:github-env

      - name: Validate Railway deploy secrets
        run: |
          set -euo pipefail

          print_key_diagnostic() {
            local name="$1"
            local value="${!name:-}"
            local source="process.env"
            local secret_present="false"
            local variable_present="false"

            secret_present="$(jq -r --arg key "$name" 'has($key)' <<< "$GH_SECRETS_JSON")"
            variable_present="$(jq -r --arg key "$name" 'has($key)' <<< "$GH_VARS_JSON")"

            if [ "$secret_present" = "true" ]; then
              source="GitHub Environment secret"
            elif [ "$variable_present" = "true" ]; then
              source="GitHub Environment variable"
            fi

            if [ -z "$value" ]; then
              echo "${name}: missing (source=${source}, secrets_json=${secret_present}, vars_json=${variable_present})"
              return
            fi

            local length
            local fingerprint
            length="${#value}"
            fingerprint="$(printf '%s' "$value" | sha256sum | cut -c1-12)"
            echo "${name}: present (source=${source}, length=${length}, sha256_12=${fingerprint}, secrets_json=${secret_present}, vars_json=${variable_present})"
          }

          echo "::group::Railway CLI diagnostics"
          echo "railway binary: $(command -v railway || true)"
          echo "railway version: $(railway --version 2>&1 || true)"
          echo "github event: ${GITHUB_EVENT_NAME:-unknown}"
          echo "github ref: ${GITHUB_REF:-unknown}"
          echo "github sha: ${GITHUB_SHA:-unknown}"
          echo "resolved environment: ${ENVIRONMENT}"
          echo "deploy commit sha: ${RAILWAY_GIT_COMMIT_SHA}"
          echo "::endgroup::"

          echo "::group::GitHub Environment payload diagnostics"
          echo "GH_SECRETS_JSON keys:"
          jq -r 'keys | sort | join(", ")' <<< "$GH_SECRETS_JSON"
          echo "GH_VARS_JSON keys:"
          jq -r 'keys | sort | join(", ")' <<< "$GH_VARS_JSON"
          echo "::endgroup::"

          echo "::group::Required Railway env diagnostics"
          print_key_diagnostic "RAILWAY_TOKEN"
          print_key_diagnostic "RAILWAY_SERVICE_ID"
          print_key_diagnostic "RAILWAY_WORKER_SERVICE_ID"
          echo "::endgroup::"

          missing=()
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            missing+=("RAILWAY_TOKEN")
          fi
          if [ -z "${RAILWAY_SERVICE_ID:-}" ]; then
            missing+=("RAILWAY_SERVICE_ID")
          fi
          if [ -z "${RAILWAY_WORKER_SERVICE_ID:-}" ]; then
            missing+=("RAILWAY_WORKER_SERVICE_ID")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required Railway deploy secrets in GitHub Environment '${ENVIRONMENT}': ${missing[*]}"
            echo "::error::Set these in GitHub → Settings → Environments → ${ENVIRONMENT}. See docs/deployment/runbooks/runbook-dev-to-production.md and docs/deployment/setup/railway-github-cli-setup.md."
            exit 1
          fi
          railway_token_length="${#RAILWAY_TOKEN}"
          if [ "${railway_token_length}" -lt 16 ]; then
            echo "::error::RAILWAY_TOKEN in GitHub Environment '${ENVIRONMENT}' is suspiciously short (${railway_token_length} chars). Rotate the Railway project token and update the GitHub Environment secret."
            exit 1
          fi

          echo "::group::Railway authentication probe"
          for service_name in api worker; do
            if [ "$service_name" = "api" ]; then
              service_id="$RAILWAY_SERVICE_ID"
            else
              service_id="$RAILWAY_WORKER_SERVICE_ID"
            fi

            echo "Validation command (${service_name}): railway variables --service <${service_name}-service-id> --json"
            if ! railway_variables_output="$(railway variables --service "$service_id" --json 2>&1)"; then
              echo "::error::Railway rejected RAILWAY_TOKEN or service id for ${service_name} service in GitHub Environment '${ENVIRONMENT}'."
              echo "::error::Command used: railway variables --service <${service_name}-service-id> --json"
              echo "::error::Output: ${railway_variables_output}"
              echo "::error::Check that RAILWAY_TOKEN belongs to the same Railway project as ${service_name} service id and that the service id is current."
              exit 1
            fi
            variable_count="$(jq 'length' <<< "$railway_variables_output" 2>/dev/null || echo "unknown")"
            echo "Railway ${service_name} service authenticated; variables visible: ${variable_count}."
          done
          echo "::endgroup::"

          echo "Railway deploy secrets present and service-scoped authentication succeeded for environment '${ENVIRONMENT}'."

      - name: Log expected scanned CI image refs from GHCR
        id: ghcr_images
        env:
          GHCR_API_IMAGE: ${{ secrets.GHCR_API_IMAGE }}
          GHCR_WORKER_IMAGE: ${{ secrets.GHCR_WORKER_IMAGE }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          API_BASE="ghcr.io/${REPOSITORY}/core-be-api"
          WORKER_BASE="ghcr.io/${REPOSITORY}/core-be-worker"
          if [ -n "${GHCR_API_IMAGE:-}" ]; then
            api_image="${GHCR_API_IMAGE}"
          else
            api_image="${API_BASE}:${RAILWAY_GIT_COMMIT_SHA}"
          fi
          if [ -n "${GHCR_WORKER_IMAGE:-}" ]; then
            worker_image="${GHCR_WORKER_IMAGE}"
          else
            worker_image="${WORKER_BASE}:${RAILWAY_GIT_COMMIT_SHA}"
          fi
          echo "api_image=${api_image}" >> "$GITHUB_OUTPUT"
          echo "worker_image=${worker_image}" >> "$GITHUB_OUTPUT"
          echo "API image: ${api_image}"
          echo "Worker image: ${worker_image}"

      - name: Run database migrations
        # `pnpm db:migrate` only needs DATABASE_URL/DATABASE_MIGRATION_URL,
        # but the migrate script transitively imports `env.config.ts` which
        # boot-validates the entire Zod env schema — so every required key
        # must be present in `process.env`. The "Export GitHub Environment
        # to runner" step has already populated all of them; we only force
        # METRICS_ENABLED=false here so the migration runner does not start
        # the metrics endpoint (step env: overrides $GITHUB_ENV).
        env:
          METRICS_ENABLED: 'false'
        run: pnpm db:migrate

      - name: Set Railway service variables
        # Mirror the entire GitHub Environment (secrets + variables) into each
        # Railway service. The GitHub Environment is the source of truth (kept
        # in sync from .env.<environment> via `pnpm github:sync`), so any new
        # runtime key flows through automatically — no workflow edit needed.
        #
        # Implementation: read `GH_SECRETS_JSON` / `GH_VARS_JSON` (job-level),
        # merge in jq, drop infra-only / CI-only keys, and emit NUL-delimited
        # KEY=VALUE pairs so multi-line values (PEM keys) survive intact.
        # Empty/null values are skipped so Railway is never blanked out by an
        # unset optional key. GitHub still masks each secret value in logs.
        #
        # NUL bytes survive only when streamed directly to the consumer — bash
        # command substitution `$(...)` silently strips NULs (you'll see
        # "warning: command substitution: ignored null byte in input"), so the
        # jq pipeline is materialised to a temp file and replayed per service.
        #
        # All KEY=VALUE pairs are bundled into a single `railway variables
        # --set ... --set ...` call per service. Batching collapses ~50 GraphQL
        # mutations into one (so transient `backboard.railway.com` timeouts
        # don't fail mid-stream) and any genuine flake is absorbed by an
        # exponential-backoff retry loop. Railway de-duplicates the implicit
        # redeploy from the variables change with our explicit `redeploy` step
        # below, so we don't bother with `--skip-deploys`.
        run: |
          set -euo pipefail

          # Keys that must NOT be pushed to Railway:
          #   - RAILWAY_*       Railway already injects its own platform vars
          #                     (RAILWAY_TOKEN, RAILWAY_SERVICE_ID,
          #                      RAILWAY_GIT_COMMIT_SHA, RAILWAY_PRIVATE_DOMAIN,
          #                      RAILWAY_PROJECT_ID, …). Mirroring any of them
          #                     from the GitHub Environment would shadow
          #                     Railway's runtime injection, so the entire
          #                     prefix is excluded.
          #   - GHCR_*          Image overrides consumed only by this workflow.
          #   - SMOKE_*         Post-deploy smoke-test credentials, runner-only.
          #   - GITHUB_TOKEN /
          #     ACTIONS_* / CI  GitHub Actions internals.
          # Anything else flows through to Railway as runtime config.
          exclude_regex='^(RAILWAY_.*|GHCR_API_IMAGE|GHCR_WORKER_IMAGE|SMOKE_DEMO_EMAIL|SMOKE_DEMO_PASSWORD|GITHUB_TOKEN|ACTIONS_.*|CI)$'

          services="$RAILWAY_SERVICE_ID"
          if [ -n "${RAILWAY_WORKER_SERVICE_ID:-}" ]; then
            services="$services $RAILWAY_WORKER_SERVICE_ID"
          fi

          # Merge vars + secrets (secrets win on the rare key-name collision)
          # and emit "KEY=VALUE\0" pairs into a temp file. Writing to a file
          # preserves NUL separators (a bash variable would not).
          payload_file="$(mktemp)"
          trap 'rm -f "$payload_file"' EXIT
          jq -nrj \
            --argjson vars "$GH_VARS_JSON" \
            --argjson secrets "$GH_SECRETS_JSON" \
            '($vars + $secrets)
              | to_entries
              | map(select(.value != null and .value != ""))
              | .[]
              | "\(.key)=\(.value)\u0000"' \
            > "$payload_file"

          payload_byte_count="$(wc -c < "$payload_file")"
          echo "Prepared $payload_byte_count bytes of NUL-delimited KEY=VALUE pairs."

          # Build a single argv batch (one --set per runtime KEY=VALUE) so we
          # can ship every variable in a single GraphQL mutation per service.
          # Track skipped key names so the operator can verify nothing was
          # excluded by accident — values are never logged, only names.
          set_args=()
          pushed_keys=()
          skipped_keys=()
          while IFS= read -r -d '' kv; do
            [ -z "$kv" ] && continue
            key="${kv%%=*}"
            if [[ "$key" =~ $exclude_regex ]]; then
              skipped_keys+=("$key")
              continue
            fi
            set_args+=(--set "$kv")
            pushed_keys+=("$key")
          done < "$payload_file"

          if [ "${#skipped_keys[@]}" -gt 0 ]; then
            echo "Skipped ${#skipped_keys[@]} keys (Railway-managed / GHCR / smoke / GitHub Actions internals — not sent to Railway service variables):"
            printf '  - %s\n' "${skipped_keys[@]}" | LC_ALL=C sort
          else
            echo "No keys matched the exclude regex; pushing all runtime variables."
          fi

          push_count=${#pushed_keys[@]}
          if [ "$push_count" -eq 0 ]; then
            echo "::warning::No runtime variables to push to Railway (every key matched the exclude regex)."
            exit 0
          fi
          echo "Pushing ${push_count} runtime variables per service:"
          printf '  + %s\n' "${pushed_keys[@]}" | LC_ALL=C sort

          # Retry the batched call to ride out transient backboard timeouts.
          # Railway accepts the same payload idempotently (set is upsert), so
          # retries are safe.
          max_attempts=5
          for service in $services; do
            attempt=1
            while true; do
              if railway variables --service "$service" "${set_args[@]}"; then
                echo "Pushed ${push_count} variables to Railway service ${service} on attempt ${attempt} (skipped ${#skipped_keys[@]} excluded keys)."
                break
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error::Railway variables push failed for service ${service} after ${max_attempts} attempts."
                exit 1
              fi
              sleep_seconds=$(( 2 ** attempt ))
              echo "Railway variables push for ${service} failed (attempt ${attempt}/${max_attempts}); retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          done

      - name: Deploy API to Railway
        # Pins the API service to the GHCR image that the build job just
        # pushed and triggers a fresh deployment from it. See the header
        # comment for why we go directly to the GraphQL API instead of the
        # Railway CLI's deploy paths. This step covers both the initial
        # bootstrap (no prior deployment) and steady-state redeploys.
        env:
          API_IMAGE: ${{ steps.ghcr_images.outputs.api_image }}
        run: |
          set -euo pipefail
          railway variable set --service "$RAILWAY_SERVICE_ID" "RAILWAY_GIT_COMMIT_SHA=${RAILWAY_GIT_COMMIT_SHA}"
          echo "Deploying API service from GHCR image: $API_IMAGE"
          pnpm tool:railway-deploy-image \
            --service "$RAILWAY_SERVICE_ID" \
            --image "$API_IMAGE" \
            --label api

      - name: Post-deploy API health check
        id: api_health
        run: |
          set -euo pipefail
          api_domain_json="$(railway domain --service "$RAILWAY_SERVICE_ID" --json)"
          api_base_url="$(printf '%s' "$api_domain_json" | node -e "
            const input = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            const url = input.domain ?? input.domains?.[0];
            if (!url) process.exit(1);
            const host = String(url).replace(/\\/$/, '');
            process.stdout.write(host.includes('://') ? host : 'https://' + host);
          ")"
          echo "api_base_url=${api_base_url}" >> "$GITHUB_OUTPUT"
          deadline=$(( $(date +%s) + 300 ))
          until curl -sfS "$api_base_url/health" -o /tmp/api-health.json; do
            [ "$(date +%s)" -lt "$deadline" ] || { echo "::error::API /health timeout"; exit 1; }
            sleep 5
          done
          node -e "const health = require('/tmp/api-health.json'); if (health.status !== 'ok') { console.error('api health status is not ok:', health.status ?? 'unknown'); process.exit(1); }"

      - name: Require worker service for deploy
        run: |
          if [ -z "$RAILWAY_WORKER_SERVICE_ID" ]; then
            echo "::error::RAILWAY_WORKER_SERVICE_ID must be set in this GitHub environment."
            exit 1
          fi

      - name: Deploy worker to Railway
        # Same flow as the API deploy step — pin the worker service to the
        # freshly pushed GHCR worker image and trigger a new deployment.
        env:
          WORKER_IMAGE: ${{ steps.ghcr_images.outputs.worker_image }}
        run: |
          set -euo pipefail
          railway variable set --service "$RAILWAY_WORKER_SERVICE_ID" "RAILWAY_GIT_COMMIT_SHA=${RAILWAY_GIT_COMMIT_SHA}"
          echo "Deploying worker service from GHCR image: $WORKER_IMAGE"
          pnpm tool:railway-deploy-image \
            --service "$RAILWAY_WORKER_SERVICE_ID" \
            --image "$WORKER_IMAGE" \
            --label worker

      - name: Post-deploy worker health check
        run: |
          set -euo pipefail
          worker_domain_json="$(railway domain --service "$RAILWAY_WORKER_SERVICE_ID" --json)"
          worker_base_url="$(printf '%s' "$worker_domain_json" | node -e "
            const input = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            const url = input.domain ?? input.domains?.[0];
            if (!url) process.exit(1);
            const host = String(url).replace(/\\/$/, '');
            process.stdout.write(host.includes('://') ? host : 'https://' + host);
          ")"
          worker_health_url="${worker_base_url}/health"
          deadline=$(( $(date +%s) + 300 ))
          until curl -sfS "$worker_health_url" -o /tmp/worker-health.json; do
            [ "$(date +%s)" -lt "$deadline" ] || { echo "::error::Worker /health timeout"; exit 1; }
            sleep 5
          done

  api-smoke:
    name: API smoke (${{ needs.resolve-environment.outputs.environment }})
    needs: [resolve-environment, deploy]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-environment.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.merge_commit_sha || github.sha }}

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run post-deploy API smoke
        env:
          BASE_URL: ${{ needs.deploy.outputs.api_base_url }}
          TEST_EMAIL: ${{ secrets.SMOKE_DEMO_EMAIL || vars.SMOKE_DEMO_EMAIL || 'demo@example.com' }}
          TEST_PASSWORD: ${{ secrets.SMOKE_DEMO_PASSWORD || 'DemoPassword123!' }}
        run: |
          set -euo pipefail
          echo "Running API smoke against ${BASE_URL}"
          pnpm test:api-smoke

      - name: Environment fully live
        env:
          ENVIRONMENT: ${{ needs.resolve-environment.outputs.environment }}
          API_BASE_URL: ${{ needs.deploy.outputs.api_base_url }}
        run: |
          set -euo pipefail
          echo "::notice title=Fully live::${ENVIRONMENT} is fully live at ${API_BASE_URL} (migrate, health, worker readiness, and API smoke passed)."
