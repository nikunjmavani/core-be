name: Reusable — Docker build and verify

on:
  workflow_call:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    name: Build + Trivy
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1

    services:
      postgres:
        image: postgres:17.10-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: core
          POSTGRES_PASSWORD: core
          POSTGRES_DB: core
        options: >-
          --health-cmd="pg_isready -U core -d core"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:8.6.3-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install: 'false'

      - name: Export shared CI test env (JWT keys + retention + secrets-encryption)
        uses: ./.github/actions/test-env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Verify Dockerfile.worker sync
        run: node tooling/ci/check-dockerfile-sync.mjs

      # Build with BuildKit GHA cache so layers are reused across runs.
      # API and worker images are loaded back into the local Docker daemon
      # (`load: true`) so Trivy + the smoke run below can reference them by tag.
      - name: Build API Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: api
          load: true
          tags: core-be:ci
          build-args: |
            GENERATE_MCP_DOCS=true
            BUILD_REVISION=${{ github.sha }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=core-be-api
          cache-to: type=gha,mode=max,scope=core-be-api

      - name: Build worker Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.worker
          load: true
          tags: core-be-worker:ci
          build-args: |
            BUILD_REVISION=${{ github.sha }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=core-be-worker
          cache-to: type=gha,mode=max,scope=core-be-worker

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: core-be:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          version: v0.69.2
          scanners: vuln
          skip-files: /app/package.json,/app/pnpm-lock.yaml

      - name: Scan worker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: core-be-worker:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          version: v0.69.2
          scanners: vuln
          skip-files: /app/package.json,/app/pnpm-lock.yaml

      - name: Verify worker image
        run: |
          set -euo pipefail
          docker run --rm core-be-worker:ci node --check dist/src/worker.js
          docker run --rm core-be-worker:ci node -e "import('argon2').then(()=>import('@sentry/profiling-node')).then(()=>console.log('native ok'))"

      # Publish scanned images to GHCR for ANY protected-branch push (dev or main).
      # reusable-railway-deploy.yml then pulls these by commit SHA tag for both environments.
      # Only `main` gets the floating `:latest` tag so dev never accidentally
      # becomes the default-consumed image.
      - name: Login to GitHub Container Registry
        if: |
          github.event_name == 'push' &&
          contains(fromJSON('["refs/heads/main","refs/heads/dev"]'), github.ref)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Push images to GHCR (main + dev)
        if: |
          github.event_name == 'push' &&
          contains(fromJSON('["refs/heads/main","refs/heads/dev"]'), github.ref)
        run: |
          set -euo pipefail
          API_IMAGE="ghcr.io/${{ github.repository }}/core-be-api"
          WORKER_IMAGE="ghcr.io/${{ github.repository }}/core-be-worker"
          docker tag core-be:ci "${API_IMAGE}:${{ github.sha }}"
          docker tag core-be-worker:ci "${WORKER_IMAGE}:${{ github.sha }}"
          docker push "${API_IMAGE}:${{ github.sha }}"
          docker push "${WORKER_IMAGE}:${{ github.sha }}"
          echo "Pushed ${API_IMAGE}:${{ github.sha }}"
          echo "Pushed ${WORKER_IMAGE}:${{ github.sha }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag core-be:ci "${API_IMAGE}:latest"
            docker tag core-be-worker:ci "${WORKER_IMAGE}:latest"
            docker push "${API_IMAGE}:latest"
            docker push "${WORKER_IMAGE}:latest"
            echo "Pushed ${API_IMAGE}:latest"
            echo "Pushed ${WORKER_IMAGE}:latest"
          fi

      - name: Boot API container and verify /health
        env:
          DATABASE_URL: postgresql://core:core@localhost:5432/core
          REDIS_URL: redis://localhost:6379
          DATABASE_SSL_ENABLED: 'false'
        run: |
          set -euo pipefail
          # JWT keys and CI test env are already in $GITHUB_ENV (exported by
          # ./.github/actions/test-env above), so we can pass them straight
          # through to `docker run -e VAR` without re-exporting heredocs.
          docker run --rm --network host \
            -e NODE_ENV=test \
            -e DATABASE_URL="$DATABASE_URL" \
            -e DATABASE_SSL_ENABLED="$DATABASE_SSL_ENABLED" \
            -e REDIS_URL="$REDIS_URL" \
            -e JWT_SECRET="$JWT_SECRET" \
            -e JWT_PRIVATE_KEY="$JWT_PRIVATE_KEY" \
            -e JWT_PUBLIC_KEY="$JWT_PUBLIC_KEY" \
            -e ALLOWED_ORIGINS="$ALLOWED_ORIGINS" \
            -e AUDIT_RETENTION_DAYS="$AUDIT_RETENTION_DAYS" \
            -e AUTH_SESSION_RETENTION_DAYS="$AUTH_SESSION_RETENTION_DAYS" \
            -e METRICS_SCRAPE_TOKEN="$METRICS_SCRAPE_TOKEN" \
            -e SECRETS_ENCRYPTION_KEY="$SECRETS_ENCRYPTION_KEY" \
            core-be:ci node dist/src/infrastructure/database/migration/migrate.js
          docker run -d --name core-be-health --network host \
            -e NODE_ENV=test \
            -e HOST=0.0.0.0 \
            -e PORT=3000 \
            -e DATABASE_URL="$DATABASE_URL" \
            -e REDIS_URL="$REDIS_URL" \
            -e DATABASE_SSL_ENABLED="$DATABASE_SSL_ENABLED" \
            -e JWT_SECRET="$JWT_SECRET" \
            -e JWT_PRIVATE_KEY="$JWT_PRIVATE_KEY" \
            -e JWT_PUBLIC_KEY="$JWT_PUBLIC_KEY" \
            -e ALLOWED_ORIGINS="$ALLOWED_ORIGINS" \
            -e AUDIT_RETENTION_DAYS="$AUDIT_RETENTION_DAYS" \
            -e AUTH_SESSION_RETENTION_DAYS="$AUTH_SESSION_RETENTION_DAYS" \
            -e METRICS_SCRAPE_TOKEN="$METRICS_SCRAPE_TOKEN" \
            -e SECRETS_ENCRYPTION_KEY="$SECRETS_ENCRYPTION_KEY" \
            core-be:ci
          if ! timeout 90 bash -c 'until curl -sf http://localhost:3000/health; do sleep 2; done'; then
            docker logs core-be-health --tail 200 || true
            docker rm -f core-be-health || true
            exit 1
          fi
          docker logs core-be-health --tail 50
          docker rm -f core-be-health
