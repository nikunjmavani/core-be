name: Reusable — Docker build and verify

on:
  workflow_call:
    inputs:
      merge_commit_sha:
        description: Commit SHA on the target branch after merge
        required: true
        type: string
      target_branch:
        description: Protected branch that received the merge (main or dev)
        required: true
        type: string
    outputs:
      api_image:
        description: GHCR API image reference pushed for this commit
        value: ${{ jobs.run.outputs.api_image }}
      worker_image:
        description: GHCR worker image reference pushed for this commit
        value: ${{ jobs.run.outputs.worker_image }}
  workflow_dispatch:
    inputs:
      merge_commit_sha:
        description: Commit SHA to build
        required: false
        type: string
        default: ''
      target_branch:
        description: Branch context (main or dev)
        required: true
        type: choice
        options:
          - main
          - dev

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 || 'true' }}

jobs:
  run:
    name: Build + Trivy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    outputs:
      api_image: ${{ steps.push.outputs.api_image }}
      worker_image: ${{ steps.push.outputs.worker_image }}
    env:
      DOCKER_BUILDKIT: 1
      MERGE_COMMIT_SHA: ${{ inputs.merge_commit_sha || github.sha }}
      TARGET_BRANCH: ${{ inputs.target_branch || github.ref_name }}

    services:
      postgres:
        image: postgres:17.10-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: core
          POSTGRES_PASSWORD: core
          POSTGRES_DB: core
        options: >-
          --health-cmd="pg_isready -U core -d core"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:8.6.3-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.MERGE_COMMIT_SHA }}
          fetch-depth: 1

      - name: Setup project identity
        uses: ./.github/actions/setup-project-identity

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install: 'false'

      - name: Export shared CI test env (JWT keys + retention + secrets-encryption)
        uses: ./.github/actions/test-env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Verify Dockerfile.worker sync
        run: node tooling/ci/check-dockerfile-sync.mjs

      - name: Build API Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          target: api
          load: true
          tags: ${{ env.DOCKER_LOCAL_API_TAG }}:ci
          build-args: |
            GENERATE_MCP_DOCS=true
            BUILD_REVISION=${{ env.MERGE_COMMIT_SHA }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ env.GHCR_CACHE_SCOPE_API }}
          cache-to: type=gha,mode=max,scope=${{ env.GHCR_CACHE_SCOPE_API }}

      - name: Build worker Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: Dockerfile.worker
          load: true
          tags: ${{ env.WORKER_IMAGE }}:ci
          build-args: |
            BUILD_REVISION=${{ env.MERGE_COMMIT_SHA }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ env.GHCR_CACHE_SCOPE_WORKER }}
          cache-to: type=gha,mode=max,scope=${{ env.GHCR_CACHE_SCOPE_WORKER }}

      - name: Scan API image with Trivy (table)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.DOCKER_LOCAL_API_TAG }}:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          version: v0.69.2
          scanners: vuln
          skip-files: /app/package.json,/app/pnpm-lock.yaml

      - name: Scan worker image with Trivy (table)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.WORKER_IMAGE }}:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          version: v0.69.2
          scanners: vuln
          skip-files: /app/package.json,/app/pnpm-lock.yaml

      - name: Scan API image with Trivy (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.DOCKER_LOCAL_API_TAG }}:ci
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true
          version: v0.69.2
          scanners: vuln
          skip-files: /app/package.json,/app/pnpm-lock.yaml

      - name: Scan worker image with Trivy (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.WORKER_IMAGE }}:ci
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true
          version: v0.69.2
          scanners: vuln
          skip-files: /app/package.json,/app/pnpm-lock.yaml

      - name: Upload API Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

      - name: Upload worker Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          sarif_file: trivy-worker.sarif
          category: trivy-worker

      - name: Verify worker image
        run: |
          set -euo pipefail
          docker run --rm ${{ env.WORKER_IMAGE }}:ci node --check dist/src/worker.js
          docker run --rm ${{ env.WORKER_IMAGE }}:ci node -e "import('argon2').then(()=>import('@sentry/profiling-node')).then(()=>console.log('native ok'))"

      - name: Generate API image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.DOCKER_LOCAL_API_TAG }}:ci
          format: spdx-json
          output-file: api-image.spdx.json
          upload-artifact: false

      - name: Generate worker image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.WORKER_IMAGE }}:ci
          format: spdx-json
          output-file: worker-image.spdx.json
          upload-artifact: false

      - name: Login to GitHub Container Registry
        if: contains(fromJSON(env.PROTECTED_BRANCHES_JSON), env.TARGET_BRANCH)
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Install Cosign
        if: contains(fromJSON(env.PROTECTED_BRANCHES_JSON), env.TARGET_BRANCH)
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Push images to GHCR (main + dev)
        id: push
        if: contains(fromJSON(env.PROTECTED_BRANCHES_JSON), env.TARGET_BRANCH)
        run: |
          set -euo pipefail
          API_IMAGE="ghcr.io/${{ github.repository }}/${{ env.API_IMAGE }}"
          WORKER_IMAGE="ghcr.io/${{ github.repository }}/${{ env.WORKER_IMAGE }}"
          docker tag ${{ env.DOCKER_LOCAL_API_TAG }}:ci "${API_IMAGE}:${MERGE_COMMIT_SHA}"
          docker tag ${{ env.WORKER_IMAGE }}:ci "${WORKER_IMAGE}:${MERGE_COMMIT_SHA}"
          docker push "${API_IMAGE}:${MERGE_COMMIT_SHA}"
          docker push "${WORKER_IMAGE}:${MERGE_COMMIT_SHA}"
          api_digest="$(docker buildx imagetools inspect --format '{{.Manifest.Digest}}' "${API_IMAGE}:${MERGE_COMMIT_SHA}")"
          worker_digest="$(docker buildx imagetools inspect --format '{{.Manifest.Digest}}' "${WORKER_IMAGE}:${MERGE_COMMIT_SHA}")"
          {
            echo "api_image=${API_IMAGE}:${MERGE_COMMIT_SHA}"
            echo "worker_image=${WORKER_IMAGE}:${MERGE_COMMIT_SHA}"
            echo "api_image_base=${API_IMAGE}"
            echo "worker_image_base=${WORKER_IMAGE}"
            echo "api_digest=${api_digest}"
            echo "worker_digest=${worker_digest}"
          } >> "$GITHUB_OUTPUT"
          echo "Pushed ${API_IMAGE}:${MERGE_COMMIT_SHA}"
          echo "Pushed ${WORKER_IMAGE}:${MERGE_COMMIT_SHA}"
          if [ "${TARGET_BRANCH}" = "main" ]; then
            docker tag ${{ env.DOCKER_LOCAL_API_TAG }}:ci "${API_IMAGE}:latest"
            docker tag ${{ env.WORKER_IMAGE }}:ci "${WORKER_IMAGE}:latest"
            docker push "${API_IMAGE}:latest"
            docker push "${WORKER_IMAGE}:latest"
            echo "Pushed ${API_IMAGE}:latest"
            echo "Pushed ${WORKER_IMAGE}:latest"
          fi
          if [ "${TARGET_BRANCH}" = "dev" ]; then
            docker tag ${{ env.DOCKER_LOCAL_API_TAG }}:ci "${API_IMAGE}:dev"
            docker tag ${{ env.WORKER_IMAGE }}:ci "${WORKER_IMAGE}:dev"
            docker push "${API_IMAGE}:dev"
            docker push "${WORKER_IMAGE}:dev"
            echo "Pushed ${API_IMAGE}:dev"
            echo "Pushed ${WORKER_IMAGE}:dev"
          fi

      - name: Sign API image
        if: contains(fromJSON(env.PROTECTED_BRANCHES_JSON), env.TARGET_BRANCH)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          set -euo pipefail
          cosign sign --yes "${{ steps.push.outputs.api_image }}"

      - name: Sign worker image
        if: contains(fromJSON(env.PROTECTED_BRANCHES_JSON), env.TARGET_BRANCH)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          set -euo pipefail
          cosign sign --yes "${{ steps.push.outputs.worker_image }}"

      - name: Attest API build provenance
        if: contains(fromJSON(env.PROTECTED_BRANCHES_JSON), env.TARGET_BRANCH)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.push.outputs.api_image_base }}
          subject-digest: ${{ steps.push.outputs.api_digest }}
          push-to-registry: true

      - name: Attest worker build provenance
        if: contains(fromJSON(env.PROTECTED_BRANCHES_JSON), env.TARGET_BRANCH)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.push.outputs.worker_image_base }}
          subject-digest: ${{ steps.push.outputs.worker_digest }}
          push-to-registry: true

      - name: Attest API SBOM
        if: contains(fromJSON(env.PROTECTED_BRANCHES_JSON), env.TARGET_BRANCH)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ steps.push.outputs.api_image_base }}
          subject-digest: ${{ steps.push.outputs.api_digest }}
          sbom-path: api-image.spdx.json
          push-to-registry: true

      - name: Attest worker SBOM
        if: contains(fromJSON(env.PROTECTED_BRANCHES_JSON), env.TARGET_BRANCH)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ steps.push.outputs.worker_image_base }}
          subject-digest: ${{ steps.push.outputs.worker_digest }}
          sbom-path: worker-image.spdx.json
          push-to-registry: true

      - name: Boot API container and verify /readyz
        env:
          DATABASE_URL: postgresql://core:core@localhost:5432/core
          REDIS_URL: redis://localhost:6379
          DATABASE_SSL_ENABLED: 'false'
        run: |
          set -euo pipefail
          docker run --rm --network host \
            -e NODE_ENV=test \
            -e DATABASE_URL="$DATABASE_URL" \
            -e DATABASE_SSL_ENABLED="$DATABASE_SSL_ENABLED" \
            -e REDIS_URL="$REDIS_URL" \
            -e JWT_PRIVATE_KEY="$JWT_PRIVATE_KEY" \
            -e JWT_PUBLIC_KEY="$JWT_PUBLIC_KEY" \
            -e ALLOWED_ORIGINS="$ALLOWED_ORIGINS" \
            -e AUDIT_RETENTION_DAYS="$AUDIT_RETENTION_DAYS" \
            -e AUTH_SESSION_RETENTION_DAYS="$AUTH_SESSION_RETENTION_DAYS" \
            -e METRICS_SCRAPE_TOKEN="$METRICS_SCRAPE_TOKEN" \
            -e SECRETS_ENCRYPTION_KEY="$SECRETS_ENCRYPTION_KEY" \
            ${{ env.DOCKER_LOCAL_API_TAG }}:ci node dist/src/infrastructure/database/migration/migrate.js
          docker run -d --name ${{ env.DOCKER_LOCAL_API_TAG }}-health --network host \
            -e NODE_ENV=test \
            -e HOST=0.0.0.0 \
            -e PORT=3000 \
            -e DATABASE_URL="$DATABASE_URL" \
            -e REDIS_URL="$REDIS_URL" \
            -e DATABASE_SSL_ENABLED="$DATABASE_SSL_ENABLED" \
            -e JWT_PRIVATE_KEY="$JWT_PRIVATE_KEY" \
            -e JWT_PUBLIC_KEY="$JWT_PUBLIC_KEY" \
            -e ALLOWED_ORIGINS="$ALLOWED_ORIGINS" \
            -e AUDIT_RETENTION_DAYS="$AUDIT_RETENTION_DAYS" \
            -e AUTH_SESSION_RETENTION_DAYS="$AUTH_SESSION_RETENTION_DAYS" \
            -e METRICS_SCRAPE_TOKEN="$METRICS_SCRAPE_TOKEN" \
            -e SECRETS_ENCRYPTION_KEY="$SECRETS_ENCRYPTION_KEY" \
            ${{ env.DOCKER_LOCAL_API_TAG }}:ci
          if ! timeout 90 bash -c 'until curl -sf http://localhost:3000/readyz; do sleep 2; done'; then
            docker logs ${{ env.DOCKER_LOCAL_API_TAG }}-health --tail 200 || true
            docker rm -f ${{ env.DOCKER_LOCAL_API_TAG }}-health || true
            exit 1
          fi
          docker logs ${{ env.DOCKER_LOCAL_API_TAG }}-health --tail 50
          docker rm -f ${{ env.DOCKER_LOCAL_API_TAG }}-health
