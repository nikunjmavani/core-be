name: Reusable — API smoke with Postgres and Redis

on:
  workflow_call:

permissions:
  contents: read

jobs:
  run:
    name: Live server
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17.10-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: core
          POSTGRES_PASSWORD: core
          POSTGRES_DB: core
        options: >-
          --health-cmd="pg_isready -U core -d core"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:8.6.3-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      NODE_ENV: test
      LOG_LEVEL: warn
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://core:core@localhost:5432/core
      REDIS_URL: redis://localhost:6379
      DATABASE_SSL_ENABLED: 'false'
      FRONTEND_URL: http://localhost:3000
      TEST_EMAIL: demo@example.com
      TEST_PASSWORD: DemoPassword123!
      BASE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Export shared CI test env (JWT keys + retention + secrets-encryption)
        uses: ./.github/actions/test-env
        with:
          rate-limit-max: '10000'
          rate-limit-window-ms: '60000'

      - name: Run migrations
        run: pnpm db:migrate

      - name: Seed full demo data
        run: pnpm db:seed:full

      - name: Start API server
        uses: ./.github/actions/start-api-server
        with:
          rate-limit-max: '10000'
          ready-timeout-seconds: '120'

      - name: API smoke tests
        run: pnpm test:api-smoke

      - name: Stop API server
        if: always()
        uses: ./.github/actions/stop-api-server
