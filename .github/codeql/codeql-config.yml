# CodeQL analysis configuration for core-be.
# Security-focused query suite (complements Semgrep SAST); quality queries are
# intentionally omitted because Biome + the custom validators already cover
# maintainability, keeping CodeQL findings high-signal.
name: core-be CodeQL config

queries:
  - uses: security-extended

# Scope analysis to the DEPLOYED, network-facing application surface — the Fastify
# app under src/ (excluding src/scripts/). Generated output, migrations, tests,
# agent worktrees, and dev/CI tooling are excluded because their inputs are trusted
# (developer CLI args, local .env / git output, interactive provider-setup API
# responses), not attacker-controlled request data, so security-extended taint
# queries systematically mis-flag them.
paths-ignore:
  - dist
  - migrations
  - coverage
  - coverage-db-bound
  - coverage-fast
  - '**/__tests__/**'
  - src/tests/**
  # Local agent worktrees checked out under .claude/ are gitignored stale copies
  # of the repo; never analyze them.
  - .claude/**
  # Dev/CI command-line utilities (project setup, codegen, migration/ops scripts).
  # These run locally or in CI with trusted inputs (a developer's own argv, local
  # .env files, local `git` output, provider-setup responses), never untrusted
  # request data, so taint queries — command injection, clear-text logging, TOCTOU
  # file races (js/file-system-race), regex / URL-substring sanitization — produce
  # systematic false positives. The deployed attack surface is the Fastify app
  # under src/ (excluding src/scripts/), which remains fully analyzed.
  - tooling/**
  - src/scripts/**

# Suppress queries that are verified architectural false positives for this
# codebase (not blanket security-rule disabling):
query-filters:
  # Every route is covered by the app-wide `@fastify/rate-limit` limiter
  # registered with `global: true` (see rate-limit.middleware.ts), plus per-route
  # org-scoped presets. CodeQL cannot see app-level middleware, so it flags every
  # route handler.
  - exclude:
      id: js/missing-rate-limiting
  # All SHA-256 hashing flagged here is over HIGH-ENTROPY secrets — organization
  # API keys (`ak_` + 32 random bytes) and password-reset / email-verification
  # tokens (randomBytes) — hashed at rest to prevent DB-leak replay. A slow
  # password KDF is neither needed nor appropriate for high-entropy secrets; user
  # passwords use a dedicated KDF, not these call sites.
  - exclude:
      id: js/insufficient-password-hash
  # All application logging flows through the process-wide Pino logger configured
  # with `redactSensitive` — recursive sensitive-value scrubbing plus redact paths,
  # censor '[REDACTED]' (see shared/utils/infrastructure/logger.util.ts). CodeQL
  # cannot see the logger's redaction hook, so it flags structured log calls that
  # carry only non-sensitive metadata (queue / cron config, API-key PUBLIC ids,
  # error and event types) as clear-text logging. Sensitive values are scrubbed
  # before reaching any transport; direct console logging is disallowed by lint.
  - exclude:
      id: js/clear-text-logging
