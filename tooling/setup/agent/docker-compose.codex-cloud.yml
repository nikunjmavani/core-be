# Codex Cloud fallback for setup containers that can start dockerd but cannot
# program iptables/NAT for Docker's default bridge. Used only by bootstrap.sh
# when ensure-docker-daemon.sh writes DOCKERD_AGENT_MODE_FILE=restricted.
services:
  postgres:
    network_mode: host
    ports: !reset []

  redis:
    network_mode: host
    ports: !reset []
