<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>core·be — control room</title>
<script src="/_hub/tw.js"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: {
      colors: {
        border: 'hsl(var(--border))', input: 'hsl(var(--input))', ring: 'hsl(var(--ring))',
        background: 'hsl(var(--background))', foreground: 'hsl(var(--foreground))',
        brand: { DEFAULT: 'hsl(var(--brand))', foreground: 'hsl(var(--brand-foreground))' },
        primary: { DEFAULT: 'hsl(var(--primary))', foreground: 'hsl(var(--primary-foreground))' },
        muted: { DEFAULT: 'hsl(var(--muted))', foreground: 'hsl(var(--muted-foreground))' },
        accent: { DEFAULT: 'hsl(var(--accent))', foreground: 'hsl(var(--accent-foreground))' },
        card: { DEFAULT: 'hsl(var(--card))', foreground: 'hsl(var(--card-foreground))' },
        success: 'hsl(var(--success))', warning: 'hsl(var(--warning))', destructive: 'hsl(var(--destructive))',
      },
      borderRadius: { xl: 'calc(var(--radius) + 4px)', lg: 'var(--radius)', md: 'calc(var(--radius) - 2px)', sm: 'calc(var(--radius) - 4px)' },
      fontFamily: {
        sans: ['ui-sans-serif','system-ui','-apple-system','Segoe UI','Roboto','Helvetica','Arial','sans-serif'],
        mono: ['ui-monospace','SFMono-Regular','Menlo','Consolas','monospace'],
      },
    } },
  };
</script>
<style>
  :root{
    --background:0 0% 100%; --foreground:240 10% 8%;
    --card:0 0% 100%; --card-foreground:240 10% 8%;
    --muted:240 5% 96%; --muted-foreground:240 4% 44%;
    --accent:240 5% 96%; --accent-foreground:240 6% 10%;
    --border:240 6% 90%; --input:240 6% 90%; --ring:245 58% 55%;
    --primary:240 6% 10%; --primary-foreground:0 0% 98%;
    --brand:245 58% 55%; --brand-foreground:0 0% 100%;
    --success:142 64% 36%; --warning:35 92% 40%; --destructive:0 72% 50%;
    --radius:0.6rem;
    --page:radial-gradient(820px 460px at 12% -16%, hsl(245 70% 96%), transparent 62%), hsl(0 0% 100%);
  }
  .dark{
    --background:240 10% 4.2%; --foreground:0 0% 96%;
    --card:240 8% 7.5%; --card-foreground:0 0% 96%;
    --muted:240 5% 13%; --muted-foreground:240 6% 60%;
    --accent:240 6% 15%; --accent-foreground:0 0% 98%;
    --border:240 5% 16%; --input:240 5% 16%; --ring:245 58% 64%;
    --primary:0 0% 96%; --primary-foreground:240 6% 10%;
    --brand:245 62% 68%; --brand-foreground:0 0% 100%;
    --success:152 55% 50%; --warning:38 92% 56%; --destructive:0 72% 63%;
    --page:radial-gradient(900px 500px at 14% -14%, hsl(245 45% 13%), transparent 60%), hsl(240 10% 4.2%);
  }
  html,body{ min-height:100% }
  body{ background:var(--page); }
  *{ scrollbar-width:thin; scrollbar-color:hsl(var(--border)) transparent }
  *::-webkit-scrollbar{ width:9px; height:9px }
  *::-webkit-scrollbar-thumb{ background:hsl(var(--border)); border-radius:10px }
  @keyframes pulse{ 0%,100%{ opacity:1 } 50%{ opacity:.4 } }
  .pulse{ animation:pulse 2.4s ease-in-out infinite }
  @media (prefers-reduced-motion:reduce){ .pulse{ animation:none } }
</style>
</head>
<body class="min-h-full font-sans text-[14px] text-foreground antialiased">

  <header class="sticky top-0 z-10 border-b border-border bg-background/80 backdrop-blur">
    <div class="mx-auto flex h-14 max-w-6xl items-center gap-3 px-6">
      <div class="grid h-7 w-7 place-items-center rounded-lg bg-brand/10 ring-1 ring-brand/30">
        <div class="h-3 w-3 rounded-[3px] bg-brand"></div>
      </div>
      <div class="leading-tight">
        <div class="text-[15px] font-semibold tracking-tight">core<span class="text-brand">·</span>be</div>
        <div class="font-mono text-[9.5px] uppercase tracking-[0.2em] text-muted-foreground">Control Room</div>
      </div>
      <div class="ml-auto flex items-center gap-3">
        <div class="inline-flex items-center gap-2 rounded-full border border-border bg-card px-3 py-1 text-[12.5px] shadow-sm">
          <span id="sys-led" class="h-2 w-2 rounded-full bg-muted"></span><span id="sys-text" class="text-muted-foreground">checking…</span>
        </div>
        <div id="clock" class="hidden font-mono text-[12.5px] tabular-nums text-muted-foreground sm:block">--:--:--</div>
        <div id="theme" class="inline-flex items-center rounded-lg border border-border bg-card p-0.5 shadow-sm"></div>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl space-y-9 px-6 py-9">
    <section>
      <div class="mb-3 flex items-baseline justify-between gap-3">
        <h2 class="text-[15px] font-semibold tracking-tight">Dashboards</h2>
        <span class="text-[12px] text-muted-foreground">open in a new tab ↗</span>
      </div>
      <div id="links" class="grid gap-3 [grid-template-columns:repeat(auto-fill,minmax(232px,1fr))]"></div>
    </section>

    <section>
      <div class="mb-3 flex items-baseline justify-between gap-3">
        <h2 class="text-[15px] font-semibold tracking-tight">System health</h2>
        <span id="upd-health" class="font-mono text-[11px] text-muted-foreground"></span>
      </div>
      <div id="health"></div>
    </section>

    <section>
      <div class="mb-3 flex items-baseline justify-between gap-3">
        <h2 class="text-[15px] font-semibold tracking-tight">Queues</h2>
        <span id="upd-queues" class="font-mono text-[11px] text-muted-foreground"></span>
      </div>
      <div id="queues"></div>
    </section>

    <section>
      <div class="mb-3 flex items-baseline justify-between gap-3">
        <h2 class="text-[15px] font-semibold tracking-tight">Metrics</h2>
        <span id="upd-metrics" class="font-mono text-[11px] text-muted-foreground"></span>
      </div>
      <div id="metrics"></div>
    </section>

    <footer class="border-t border-border pt-5 text-[12px] text-muted-foreground">
      Gated tools proxy through <span class="font-mono">localhost:3010</span> with credentials injected. Live every 10s.
    </footer>
  </main>

<script>
const $ = (id) => document.getElementById(id);
const el = (tag, cls, txt) => { const n = document.createElement(tag); if (cls) n.className = cls; if (txt != null) n.textContent = txt; return n; };
const CARD = 'rounded-xl border border-border bg-card shadow-sm';
const fmtTime = () => new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
const stamp = (id) => { const e = $(id); if (e) e.textContent = `updated ${fmtTime()}`; };

/* ── theme (light / dark / system) ── */
const SUN = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
const MOON = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>';
const MON = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>';
const mq = window.matchMedia('(prefers-color-scheme: dark)');
let themeMode = localStorage.getItem('hub-theme') || 'system';
function applyTheme() {
  const dark = themeMode === 'dark' || (themeMode === 'system' && mq.matches);
  document.documentElement.classList.toggle('dark', dark);
  document.querySelectorAll('[data-theme]').forEach((b) => {
    const on = b.getAttribute('data-theme') === themeMode;
    b.className = `grid h-7 w-7 place-items-center rounded-md transition ${on ? 'bg-accent text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'}`;
  });
}
[['light', SUN], ['dark', MOON], ['system', MON]].forEach(([id, icon]) => {
  const b = el('button', ''); b.type = 'button'; b.title = id[0].toUpperCase() + id.slice(1); b.setAttribute('data-theme', id);
  b.innerHTML = icon; b.onclick = () => { themeMode = id; localStorage.setItem('hub-theme', id); applyTheme(); };
  $('theme').appendChild(b);
});
mq.addEventListener('change', () => { if (themeMode === 'system') applyTheme(); });
applyTheme();

/* ── quick links ── */
const LINKS = [
  { name:'API Reference', href:'http://localhost:3000/reference/',  status:'reference', desc:'Scalar — interactive API docs' },
  { name:'Queues',        href:'http://localhost:3010/admin/queues', status:'bullboard', desc:'Bull Board — jobs & DLQs' },
  { name:'SonarQube',     href:'http://localhost:9000',              status:'sonar',     desc:'Code quality & security', meta:'admin / admin' },
  { name:'Drizzle Studio',href:'https://local.drizzle.studio',       status:'drizzle',   desc:'Browse & edit the database', meta:'Chrome' },
];
LINKS.forEach((l) => {
  const a = el('a', 'group block rounded-xl border border-border bg-card p-4 shadow-sm transition hover:-translate-y-0.5 hover:border-brand/40 hover:shadow-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring');
  a.href = l.href; a.target = '_blank'; a.rel = 'noopener';
  const top = el('div', 'flex items-center gap-2');
  const led = el('span', 'h-2 w-2 rounded-full bg-muted'); led.id = `lled-${l.status}`;
  top.append(led, el('span', 'text-[14px] font-semibold', l.name));
  if (l.meta) top.appendChild(el('span', 'ml-auto rounded-md border border-border bg-muted px-1.5 py-px font-mono text-[10px] text-muted-foreground', l.meta));
  const arrow = el('span', `${l.meta ? '' : 'ml-auto '}text-muted-foreground transition group-hover:text-brand`, '↗');
  top.appendChild(arrow); a.appendChild(top);
  a.appendChild(el('p', 'mt-2 text-[12.5px] text-muted-foreground', l.desc));
  const b = el('div', 'mt-2 flex items-center justify-between');
  b.appendChild(el('span', 'truncate font-mono text-[11.5px] text-brand', l.href.replace(/^https?:\/\//, '')));
  const lat = el('span', 'ml-2 flex-none font-mono text-[11px] text-muted-foreground', '—'); lat.id = `lms-${l.status}`;
  b.appendChild(lat); a.appendChild(b); $('links').appendChild(a);
});

/* ── helpers ── */
const dot = (color, pulse) => el('span', `h-2 w-2 flex-none rounded-full bg-${color}${pulse ? ' pulse' : ''}`);
function statusColor(s) { const v = String(s).toLowerCase(); if (['ok','live','ready','healthy','connected','up'].includes(v)) return 'success'; if (['starting','degraded','warming','stalled'].includes(v)) return 'warning'; return 'destructive'; }
async function getJson(url) { try { const j = await (await fetch(url, { cache:'no-store' })).json(); return j && j.data !== undefined && j.meta ? j.data : j; } catch (e) { return null; } }
async function getText(url) { try { return await (await fetch(url, { cache:'no-store' })).text(); } catch (e) { return null; } }

/* ── System health (API + Worker, no duplicate deps) ── */
function procPill(label, d) {
  const ok = d && statusColor(d.status) === 'success';
  const pill = el('div', 'inline-flex items-center gap-2 rounded-full border border-border bg-muted/50 px-3 py-1');
  pill.appendChild(dot(d ? statusColor(d.status) : 'muted', ok));
  pill.appendChild(el('span', 'text-[12.5px] font-semibold', label));
  pill.appendChild(el('span', 'text-[12px] capitalize text-muted-foreground', d ? d.status : 'unreachable'));
  if (d && d.workersRegistered != null) pill.appendChild(el('span', 'font-mono text-[11px] text-muted-foreground', `· ${d.workersRegistered} workers`));
  return pill;
}
function depRow(label, d) {
  const v = d ? d[label.toLowerCase()] : undefined;
  const up = v !== undefined && statusColor(v) === 'success';
  const lat = d?.latencyMs ? d.latencyMs[label.toLowerCase()] : null;
  const row = el('div', 'flex items-center gap-2 text-[12.5px]');
  row.appendChild(dot(v === undefined ? 'muted' : (up ? 'success' : 'destructive'), up));
  row.appendChild(el('span', 'text-muted-foreground', label));
  row.appendChild(el('span', 'ml-auto font-mono text-[11px] text-muted-foreground', lat != null ? `${lat}ms` : (v === undefined ? '—' : v)));
  return row;
}
function renderHealth(api, worker) {
  const wrap = el('div', `${CARD} p-5`);
  const pills = el('div', 'flex flex-wrap items-center gap-2.5');
  pills.append(procPill('API', api), procPill('Worker', worker));
  wrap.appendChild(pills);
  wrap.appendChild(el('div', 'mb-2.5 mt-5 font-mono text-[10px] uppercase tracking-[0.16em] text-muted-foreground', 'Dependencies'));
  const grid = el('div', 'grid gap-3 [grid-template-columns:repeat(auto-fill,minmax(220px,1fr))]');
  ['Database', 'Redis', 'BullMQ'].forEach((dep) => {
    const c = el('div', 'rounded-lg border border-border bg-muted/30 p-3.5');
    c.appendChild(el('div', 'mb-2.5 text-[13px] font-semibold', dep));
    const api2 = depRow(dep, api); const wk2 = depRow(dep, worker);
    api2.insertBefore(el('span', 'mr-1 font-mono text-[10px] uppercase tracking-wide text-muted-foreground/70', 'api'), api2.children[1]);
    wk2.insertBefore(el('span', 'mr-1 font-mono text-[10px] uppercase tracking-wide text-muted-foreground/70', 'wkr'), wk2.children[1]);
    const stack = el('div', 'space-y-1.5'); stack.append(api2, wk2); c.appendChild(stack);
    grid.appendChild(c);
  });
  wrap.appendChild(grid);
  $('health').replaceChildren(wrap); stamp('upd-health');
}

/* ── Queues (per-queue stats from Bull Board API) ── */
const badge = (n, label, color) => { const b = el('span', `inline-flex items-center gap-1 rounded-md border px-1.5 py-0.5 font-mono text-[11px] border-${color}/30 text-${color}`); b.appendChild(el('span', 'font-semibold', String(n))); b.appendChild(el('span', 'text-muted-foreground', label)); return b; };
function statCard(label, value, color) {
  const c = el('div', `${CARD} px-4 py-3`);
  c.appendChild(el('div', 'text-[11.5px] text-muted-foreground', label));
  c.appendChild(el('div', `mt-1.5 font-mono text-[22px] font-semibold tabular-nums leading-none ${color && value > 0 ? `text-${color}` : ''}`, value == null ? '—' : value.toLocaleString()));
  return c;
}
let prevCompleted = null, prevAt = 0;
function renderQueues(queues) {
  const host = $('queues');
  if (!queues) { host.replaceChildren(el('div', `${CARD} p-4 text-[13px] text-muted-foreground`, 'Queue data unavailable.')); return; }
  const KEYS = ['waiting','active','delayed','failed','paused','completed','prioritized'];
  const agg = {}; KEYS.forEach((k) => { agg[k] = 0; }); let dlq = 0;
  queues.forEach((q) => {
    const c = q.counts || {}; KEYS.forEach((k) => { agg[k] += c[k] || 0; });
    if (/-dlq$/.test(q.name)) dlq += (c.waiting || 0) + (c.failed || 0) + (c.delayed || 0) + (c.active || 0) + (c.paused || 0);
  });
  const now = Date.now();
  let tput = null;
  if (prevCompleted != null && now > prevAt) tput = Math.max(0, Math.round((agg.completed - prevCompleted) / ((now - prevAt) / 60000)));
  prevCompleted = agg.completed; prevAt = now;

  const wrap = el('div', 'space-y-4');
  const stats = el('div', 'grid gap-3 [grid-template-columns:repeat(auto-fill,minmax(140px,1fr))]');
  stats.append(
    statCard('Waiting', agg.waiting),
    statCard('Active', agg.active, 'brand'),
    statCard('Delayed', agg.delayed, 'warning'),
    statCard('Failed', agg.failed, 'destructive'),
    statCard('Paused', agg.paused, 'warning'),
    statCard('DLQ depth', dlq, 'destructive'),
    statCard('Throughput/min', tput),
  );
  wrap.appendChild(stats);

  const active = queues.filter((q) => { const c = q.counts || {}; return (c.waiting || 0) + (c.active || 0) + (c.delayed || 0) + (c.failed || 0) + (c.paused || 0) + (c.prioritized || 0) > 0; });
  const idle = queues.length - active.length;
  active.sort((a, b) => (b.counts.failed || 0) - (a.counts.failed || 0) || (b.counts.paused || 0) - (a.counts.paused || 0));

  const list = el('div', `${CARD} divide-y divide-border`);
  const head = el('div', 'flex items-center justify-between px-4 py-2.5');
  head.appendChild(el('div', 'font-mono text-[10px] uppercase tracking-[0.16em] text-muted-foreground', `Active queues · ${active.length}`));
  head.appendChild(el('div', 'text-[11.5px] text-muted-foreground', `${idle} idle · ${queues.length} total`));
  list.appendChild(head);
  if (!active.length) list.appendChild(el('div', 'px-4 py-5 text-center text-[13px] text-muted-foreground', 'All queues idle — no pending, failed, or paused jobs.'));
  active.forEach((q) => {
    const c = q.counts || {}; const isDlq = /-dlq$/.test(q.name);
    const row = el('div', 'flex flex-wrap items-center gap-x-3 gap-y-1.5 px-4 py-2.5');
    const nm = el('div', 'flex min-w-0 items-center gap-2');
    nm.appendChild(dot(c.failed ? 'destructive' : (c.paused ? 'warning' : (c.active ? 'brand' : 'muted-foreground')), !!c.active));
    nm.appendChild(el('span', 'truncate font-mono text-[12.5px]', q.name));
    if (isDlq) nm.appendChild(el('span', 'rounded border border-destructive/30 px-1 text-[9.5px] font-semibold uppercase text-destructive', 'dlq'));
    if (q.isPaused) nm.appendChild(el('span', 'rounded border border-warning/30 px-1 text-[9.5px] font-semibold uppercase text-warning', 'paused'));
    row.appendChild(nm);
    const tags = el('div', 'ml-auto flex flex-wrap items-center gap-1.5');
    [['waiting','muted-foreground'],['active','brand'],['delayed','warning'],['prioritized','muted-foreground'],['paused','warning'],['failed','destructive'],['completed','success']].forEach(([k, color]) => { if (c[k]) tags.appendChild(badge(c[k], k, color)); });
    row.appendChild(tags); list.appendChild(row);
  });
  wrap.appendChild(list);
  host.replaceChildren(wrap); stamp('upd-queues');
}

/* ── Metrics ── */
const METRIC_CARDS = [
  { name:'http_requests_total', label:'HTTP requests', unit:'count' },
  { name:'process_resident_memory_bytes', label:'Memory · RSS', unit:'bytes' },
  { name:'nodejs_eventloop_lag_p99_seconds', label:'Event-loop p99', unit:'ms' },
  { name:'process_cpu_seconds_total', label:'CPU time', unit:'sec' },
  { name:'bullmq_queue_waiting', label:'Queue · waiting', unit:'count' },
  { name:'bullmq_queue_failed', label:'Queue · failed', unit:'count' },
  { name:'mail_outbox_pending', label:'Mail outbox', unit:'count' },
  { name:'dlq_depth', label:'DLQ depth', unit:'count' },
];
function fmt(v, unit) {
  if (unit === 'bytes') { const mb = v / 1048576; return mb >= 1024 ? [(mb/1024).toFixed(1),'GB'] : [mb.toFixed(0),'MB']; }
  if (unit === 'ms') { const ms = v * 1000; return [ms < 10 ? ms.toFixed(1) : String(Math.round(ms)),'ms']; }
  if (unit === 'sec') { return [v.toFixed(1),'s']; }
  return [Math.round(v).toLocaleString(),''];
}
function renderMetrics(text) {
  if (text == null) { $('upd-metrics').textContent = 'unavailable'; return; }
  const sums = {}; let _count = 0;
  for (const line of text.split('\n')) {
    if (!line || line[0] === '#') continue;
    const m = line.match(/^([a-zA-Z_:][\w:]*)(\{[^}]*\})?\s+(-?[\d.eE+]+)/);
    if (!m) continue; _count++; const v = parseFloat(m[3]); sums[m[1]] = (sums[m[1]] || 0) + (Number.isFinite(v) ? v : 0);
  }
  const grid = el('div', 'grid gap-3.5 [grid-template-columns:repeat(auto-fill,minmax(195px,1fr))]');
  METRIC_CARDS.forEach((mc) => {
    const card = el('div', `${CARD} px-4 py-3.5`);
    card.appendChild(el('div', 'text-[12px] text-muted-foreground', mc.label));
    const val = el('div', 'mt-2 font-mono text-[26px] font-semibold leading-none tabular-nums tracking-tight');
    if (sums[mc.name] === undefined) val.innerHTML = '<span class="text-[16px] font-normal text-muted-foreground">n/a</span>';
    else { const [num, unit] = fmt(sums[mc.name], mc.unit); val.innerHTML = num + (unit ? ` <span class="text-[14px] font-normal text-muted-foreground">${unit}</span>` : ''); }
    card.appendChild(val); grid.appendChild(card);
  });
  $('metrics').replaceChildren(grid); stamp('upd-metrics');
}

/* ── status (links + sys badge) ── */
let last = null;
function applyStatus() {
  let up = 0, total = 0;
  ['reference','bullboard','sonar','drizzle'].forEach((k) => { const e = $(`lled-${k}`); if (e) e.className = `h-2 w-2 rounded-full bg-${last?.[k] ? (last[k].up ? 'success pulse' : 'destructive') : 'muted'}`; const m = $(`lms-${k}`); if (m) m.textContent = last?.[k] ? `${last[k].ms}ms` : '—'; });
  if (last) for (const k of Object.keys(last)) { total++; if (last[k].up) up++; }
  const cls = last ? (up === total ? 'bg-success pulse' : (up === 0 ? 'bg-destructive' : 'bg-warning')) : 'bg-muted';
  $('sys-led').className = `h-2 w-2 rounded-full ${cls}`;
  $('sys-text').textContent = last ? `${up}/${total} online` : 'offline';
}

async function poll() {
  const [status, api, worker, qd, metrics] = await Promise.all([
    getJson('/_status'), getJson('/readyz'), getJson('/_worker/readyz'), getJson('/admin/queues/api/queues?page=1'), getText('/metrics'),
  ]);
  if (status) { last = status; }
  applyStatus();
  renderHealth(api, worker);
  renderQueues(qd ? qd.queues : null);
  renderMetrics(metrics);
}
function tick() {
  const tz = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZoneName: 'short' });
  $('clock').textContent = tz;
}

poll(); setInterval(poll, 10000);
tick(); setInterval(tick, 1000);
</script>
</body>
</html>
