  if (l.meta) a.appendChild(el('span', 'rounded border border-border bg-muted px-1.5 py-px font-mono text-[10px] text-muted-foreground', l.meta));
  const lat = el('span', 'font-mono text-[11px] text-muted-foreground', '—'); lat.id = `lms-${l.status}`; a.appendChild(lat);
  a.appendChild(el('span', 'text-muted-foreground transition group-hover:text-brand', '↗'));
  const copy = el('button', 'inline-flex h-5 w-5 flex-none items-center justify-center rounded text-muted-foreground/60 transition hover:bg-muted hover:text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring sm:opacity-0 sm:group-hover:opacity-100');
  copy.type = 'button'; copy.title = 'Copy link'; copy.setAttribute('aria-label', `Copy ${l.name} link`); copy.innerHTML = iconSvg('copy', 13);
  copy.onclick = async (e) => { e.preventDefault(); e.stopPropagation(); try { await navigator.clipboard.writeText(l.href); } catch (_) { const t = el('textarea'); t.value = l.href; document.body.appendChild(t); t.select(); try { document.execCommand('copy'); } catch (_2) {} t.remove(); } copy.innerHTML = iconSvg('check', 13); copy.classList.add('text-success'); setTimeout(() => { copy.innerHTML = iconSvg('copy', 13); copy.classList.remove('text-success'); }, 1200); };
  a.appendChild(copy); $('links').appendChild(a);
});

/* ── 4. Queues (pastel state bar + one legend + rich hover) ── */
const QSTATES = [['waiting','q-waiting'],['active','q-active'],['prioritized','q-active'],['delayed','q-delayed'],['paused','q-delayed'],['failed','q-failed'],['completed','q-completed']];
function queueBar(c) {
  const bar = el('div', 'flex h-2.5 w-full overflow-hidden rounded-full bg-muted');
  let any = false;
  QSTATES.forEach(([k, v]) => { const n = c[k] || 0; if (!n) return; any = true; const seg = el('div', ''); seg.style.flex = `${n} 1 0`; seg.style.minWidth = '4px'; seg.style.backgroundColor = `hsl(var(--${v}))`; bar.appendChild(seg); });
  if (!any) bar.appendChild(el('div', 'flex-1'));
  return bar;
}
function relAgoTs(ts) { const t = Date.parse(ts); if (isNaN(t)) return '—'; const s = Math.round((Date.now() - t) / 1000); if (s < 60) return `${s}s ago`; if (s < 3600) return `${Math.floor(s / 60)}m ago`; if (s < 86400) return `${Math.floor(s / 3600)}h ago`; return `${Math.floor(s / 86400)}d ago`; }
function queueTip(q, lastJobAt) {
  const c = q.counts || {}; const total = QSTATES.reduce((s, [k]) => s + (c[k] || 0), 0);
  const seen = new Set();
  const rows = QSTATES.filter(([k]) => { if (seen.has(k)) return false; seen.add(k); return true; }).map(([k, v]) => {
    const n = c[k] || 0;
    return `<div class="flex items-center gap-2 ${n ? '' : 'opacity-40'}"><span class="h-2 w-2 flex-none rounded-full" style="background:hsl(var(--${v}))"></span><span class="flex-1 capitalize">${k}</span><span class="font-mono tabular-nums">${n.toLocaleString()}</span></div>`;
  }).join('');
  const tags = `${/-dlq$/.test(q.name) ? '<span class="text-destructive">dead-letter</span> · ' : ''}${q.isPaused ? '<span class="text-warning">paused</span> · ' : ''}`;
  return `<div class="mb-1.5 font-mono text-[12.5px] font-semibold">${q.name}</div>${tags ? `<div class="mb-1.5 text-[11px] text-muted-foreground">${tags.replace(/ · $/, '')}</div>` : ''}<div class="min-w-[190px] space-y-1">${rows}<div class="mt-1.5 flex items-center justify-between border-t border-border pt-1.5"><span class="text-muted-foreground">total</span><span class="font-mono font-semibold tabular-nums">${total.toLocaleString()}</span></div><div class="flex items-center justify-between"><span class="text-muted-foreground">last run</span><span class="font-mono tabular-nums">${lastJobAt ? relAgoTs(lastJobAt) : 'idle'}</span></div></div>`;
}
function renderQueues(queues, agg, sS, worker, opts) {
  const host = $('queues');
  const lastJob = {}; ((worker && worker.worker_queues) || []).forEach((q) => { lastJob[q.queue] = q.last_job_at; });
  const stale = !!(opts && opts.stale) && everLoaded.queues;
  if (!queues) { if (!everLoaded.queues) return; host.replaceChildren(el('div', `${CARD} p-4 text-[13px] text-muted-foreground`, 'Queue data unavailable.')); return; }
  const active = queues.filter((q) => { const c = q.counts || {}; return (c.waiting || 0) + (c.active || 0) + (c.delayed || 0) + (c.failed || 0) + (c.paused || 0) + (c.prioritized || 0) > 0; });
  const idle = queues.length - active.length;
  active.sort((a, b) => (b.counts.failed || 0) - (a.counts.failed || 0) || (b.counts.paused || 0) - (a.counts.paused || 0));

  const wrap = el('div', `space-y-3.5${stale ? ' stale' : ''}`);
  // KPI summary — these aggregate the queue list below, so they live with Queues
  const kpis = el('div', `grid grid-cols-2 gap-3.5 [grid-template-columns:repeat(auto-fit,minmax(150px,1fr))]${stale ? ' stale' : ''}`);
  JOBS.forEach((j) => kpis.appendChild(jobTile(j, agg, sS)));
  wrap.appendChild(kpis);
  const head = el('div', 'flex flex-wrap items-center justify-between gap-x-4 gap-y-1.5 px-0.5');
  const cap = el('div', 'flex items-center gap-2');
  cap.appendChild(el('div', 'font-mono text-[10px] uppercase tracking-[0.16em] text-muted-foreground', `Active queues · ${active.length}`)); if (stale) cap.appendChild(staleTag());
  head.appendChild(cap);
  const legend = el('div', 'flex flex-wrap items-center gap-x-2.5 gap-y-1 text-[11px] text-muted-foreground');
  [['waiting','q-waiting'],['active','q-active'],['delayed/paused','q-delayed'],['failed','q-failed'],['completed','q-completed']].forEach(([k, v]) => { const it = el('span', 'inline-flex items-center gap-1.5'); it.append(varDot(v), el('span', '', k)); legend.appendChild(it); });
  head.appendChild(legend); wrap.appendChild(head);

  if (!active.length) wrap.appendChild(el('div', `${CARD} px-4 py-10 text-center text-[13px] text-muted-foreground`, 'All queues idle — no pending, failed, or paused jobs.'));
  else {
    const grid = el('div', 'grid grid-cols-1 gap-2 xl:grid-cols-2 min-[2100px]:grid-cols-3');
    active.forEach((q) => {
      const c = q.counts || {}; const isDlq = /-dlq$/.test(q.name);
      const total = QSTATES.reduce((s, [k]) => s + (c[k] || 0), 0);
      const needsAttention = (c.failed || 0) > 0 || (isDlq && total > 0); // failed jobs or a non-empty dead-letter queue
      const row = el('div', `${CARD} grid cursor-default grid-cols-[1fr_auto] items-center gap-3 px-3.5 py-2.5 transition hover:border-brand/40${needsAttention ? ' border-destructive/30 bg-destructive/10' : (q.isPaused ? ' border-warning/30 bg-warning/10' : '')}`);
      const nm = el('div', 'flex min-w-0 items-center gap-2');
      nm.appendChild(varDot(c.failed ? 'q-failed' : (c.paused ? 'q-delayed' : (c.active ? 'q-active' : 'q-waiting')), !!c.active));
      nm.appendChild(el('span', 'truncate min-w-0 font-mono text-[12.5px]', q.name));
      if (isDlq) nm.appendChild(el('span', 'flex-none rounded border border-destructive/30 px-1 text-[9.5px] font-semibold uppercase text-destructive', 'dlq'));
      if (q.isPaused) nm.appendChild(el('span', 'flex-none rounded border border-warning/30 px-1 text-[9.5px] font-semibold uppercase text-warning', 'paused'));
      row.appendChild(nm);
      const rt = el('div', 'flex items-center gap-3');
      const barWrap = el('div', 'w-28 sm:w-40'); barWrap.appendChild(queueBar(c)); rt.appendChild(barWrap);
      rt.appendChild(el('span', 'w-12 text-right font-mono text-[12px] tabular-nums text-muted-foreground', total.toLocaleString()));
      row.appendChild(rt);
      bindTip(row, queueTip(q, lastJob[q.name]));
      grid.appendChild(row);
    });
    wrap.appendChild(grid);
  }
  host.replaceChildren(wrap); everLoaded.queues = true;
}

/* ── 6. Requests (top routes by traffic · avg latency · 5xx) ── */
let reqFilter = 'all'; // active Requests tab (persists across polls + manual refresh)
function renderRequests(routes, opts) {
  const host = $('requests'); if (!host) return;
  const stale = !!(opts && opts.stale) && everLoaded.requests;
  if (!routes) { if (!everLoaded.requests) return; routes = lastGood.routes || []; }
  const INFRA = /^\/(metrics|livez|readyz|admin)|^\/reference|^\/_/;
  const avgMsOf = (r) => (r.count ? (r.sum / r.count) * 1000 : 0);
  const base = routes.filter((r) => r.route && r.route !== '__unmatched__' && !INFRA.test(r.route));
  // ── tab filter group: All / Slowest / Failed (5xx) / 4xx — each re-sorts/filters the same data ──
  const TABS = [
    { k: 'all',    label: 'All',     n: base.length,                                  rows: base.slice().sort((a, b) => b.count - a.count) },
    { k: 'slow',   label: 'Slowest', n: base.filter((r) => avgMsOf(r) >= 200).length, rows: base.slice().sort((a, b) => avgMsOf(b) - avgMsOf(a)) },
    { k: 'failed', label: 'Failed',  n: base.filter((r) => r.errors > 0).length,       rows: base.filter((r) => r.errors > 0).sort((a, b) => b.errors - a.errors || b.count - a.count) },
    { k: 'client', label: '4xx',     n: base.filter((r) => r.clientErrors > 0).length, rows: base.filter((r) => r.clientErrors > 0).sort((a, b) => b.clientErrors - a.clientErrors) },
  ];
  if (!TABS.some((t) => t.k === reqFilter)) reqFilter = 'all';
  const active = TABS.find((t) => t.k === reqFilter);
  const list = active.rows;
  // FLIP: remember each row's current position so the re-sort animates (slides) instead of jumping
  const oldTop = {};
  host.querySelectorAll('[data-rkey]').forEach((e) => { oldTop[e.getAttribute('data-rkey')] = e.getBoundingClientRect().top; });
  const card = el('div', `${CARD} overflow-hidden${stale ? ' stale' : ''}`);
  const tabbar = el('div', 'flex flex-wrap items-center gap-1.5 border-b border-border px-3 py-2');
  const cap = el('div', 'mr-1 flex items-center gap-1.5');
  cap.appendChild(iconEl('route', 'text-muted-foreground'));
  cap.appendChild(el('span', 'font-mono text-[10px] uppercase tracking-[0.16em] text-muted-foreground', 'Requests'));
  tabbar.appendChild(cap);
  TABS.forEach((t) => {
    const on = t.k === reqFilter, fail = t.k === 'failed' && t.n > 0;
    const b = el('button', `inline-flex items-center gap-1 rounded-full border px-2.5 py-0.5 text-[11px] font-medium transition ${on ? (fail ? 'border-destructive/40 bg-destructive/15 text-destructive' : 'border-brand/45 bg-brand/15 text-foreground') : 'border-border bg-muted/40 text-muted-foreground hover:text-foreground'}`);
    b.type = 'button';
    b.append(el('span', '', t.label), el('span', `font-mono text-[10px] tabular-nums ${fail ? 'text-destructive' : (on ? 'text-foreground/70' : 'text-muted-foreground/70')}`, String(t.n)));
    b.onclick = () => { reqFilter = t.k; renderRequests(lastGood.routes || routes, {}); };
    tabbar.appendChild(b);
  });
  if (stale) tabbar.appendChild(staleTag());
  card.appendChild(tabbar);
  const cols = 'grid grid-cols-[1fr_auto_auto_auto] items-center gap-x-4 px-4 sm:gap-x-8';
  const head = el('div', `${cols} border-b border-border py-2`);
  head.appendChild(el('div', 'font-mono text-[10px] uppercase tracking-[0.16em] text-muted-foreground', `${active.label} · ${list.length}`));
  head.appendChild(el('div', 'w-[60px] text-right text-[11px] font-semibold', 'calls'));
  head.appendChild(el('div', 'w-[60px] text-right text-[11px] font-semibold', 'avg'));
  head.appendChild(el('div', 'w-[52px] text-right text-[11px] font-semibold', reqFilter === 'client' ? '4xx' : '5xx'));
  card.appendChild(head);
  if (!list.length) card.appendChild(el('div', 'px-4 py-6 text-center text-[13px] text-muted-foreground', reqFilter === 'failed' ? 'No 5xx failures — all clear.' : reqFilter === 'client' ? 'No 4xx responses.' : 'No application requests yet.'));
  list.forEach((r) => {
    const avgMs = r.count ? (r.sum / r.count) * 1000 : 0;
    const slow = avgMs > 500, err = r.errors > 0;
    const row = el('div', `${cols} border-t border-border py-2 will-change-transform${err ? ' bg-destructive/10' : ''}`);
    row.setAttribute('data-rkey', `${r.method} ${r.route}`);
    const nm = el('div', 'flex min-w-0 flex-col gap-0.5');
    const line = el('div', 'flex min-w-0 items-center gap-2');
    line.appendChild(el('span', 'flex-none rounded border border-border bg-muted px-1 font-mono text-[9.5px] font-semibold uppercase text-muted-foreground', r.method || '—'));
    // errored routes show the FULL path (no truncation) so you can see exactly what failed
    line.appendChild(el('span', `font-mono text-[12px]${err ? ' break-all text-destructive' : ' truncate'}`, r.route));
    nm.appendChild(line);
    if ((err || reqFilter === 'client') && Object.keys(r.errStatuses).length) {
      const breakdown = Object.keys(r.errStatuses).sort((a, b) => a - b).map((s) => `${s}×${r.errStatuses[s].toLocaleString()}`).join(' · ');
      nm.appendChild(el('div', `font-mono text-[10px] ${err ? 'text-destructive/80' : 'text-muted-foreground'}`, `${err ? '⚠ ' : ''}${breakdown}`));
    }
    row.appendChild(nm);
    row.appendChild(el('div', 'w-[60px] text-right font-mono text-[12px] tabular-nums text-muted-foreground', r.count.toLocaleString()));
    row.appendChild(el('div', `w-[60px] text-right font-mono text-[12px] tabular-nums${slow ? ' text-warning' : ' text-muted-foreground'}`, `${avgMs < 10 ? avgMs.toFixed(1) : Math.round(avgMs)}ms`));
    const show4xx = reqFilter === 'client', lastBad = show4xx ? r.clientErrors > 0 : err;
    row.appendChild(el('div', `w-[52px] text-right font-mono text-[12px] tabular-nums${lastBad ? ' font-semibold ' + (err ? 'text-destructive' : 'text-warning') : ' text-muted-foreground'}`, lastBad ? (show4xx ? r.clientErrors : r.errors).toLocaleString() : '·'));
    card.appendChild(row);
  });
  host.replaceChildren(card); everLoaded.requests = true;
  // FLIP step 2: slide each surviving row from its old position to the new sorted spot
  host.querySelectorAll('[data-rkey]').forEach((e) => {
    const prev = oldTop[e.getAttribute('data-rkey')];
    if (prev == null) return;
    const delta = prev - e.getBoundingClientRect().top;
    if (!delta) return;
    e.style.transform = `translateY(${delta}px)`;
    e.style.transition = 'none';
    requestAnimationFrame(() => { e.style.transition = 'transform .5s cubic-bezier(.22,1,.36,1)'; e.style.transform = ''; });
  });
}

/* ── status (link LEDs + sticky header pill) ── */
let last = null;
function applyStatus() {
  ['reference','bullboard','sonar','drizzle'].forEach((k) => { const e = $(`lled-${k}`); if (e) e.className = `h-2 w-2 rounded-full bg-${last?.[k] ? (last[k].up ? 'success pulse' : 'destructive') : 'muted'}`; const m = $(`lms-${k}`); if (m) m.textContent = last?.[k] ? `${last[k].ms}ms` : '—'; });
  let up = 0, total = 0; if (last) for (const k of Object.keys(last)) { total++; if (last[k].up) up++; }
  const cls = last ? (up === total ? 'bg-success pulse' : (up === 0 ? 'bg-destructive' : 'bg-warning')) : 'bg-muted';
  $('sys-led').className = `h-2 w-2 rounded-full ${cls}`;
  $('sys-text').textContent = last ? `${up}/${total} online` : 'offline';
}

/* ── poll loop (global · human-readable freshness) ── */
const lastGood = { api:null, worker:null, queues:null, agg:null, sS:null, sW:null, routes:null };
const everLoaded = { status:false, vitals:false, queues:false, requests:false };
let refreshing = false, lastPollAt = 0;
function relAgo() { if (!lastPollAt) return 'updating…'; const s = Math.round((Date.now() - lastPollAt) / 1000); if (s < 5) return 'updated just now'; if (s < 60) return `updated ${s}s ago`; const m = Math.floor(s / 60); return `updated ${m}m ago`; }
function freshTick() { const e = $('refresh-status'); if (e && !refreshing) e.textContent = relAgo(); }
async function poll() {
  if (refreshing) return;
  refreshing = true; $('refresh-icon').className = 'inline-flex spin'; $('refresh-status').textContent = 'updating…';
  const [status, api, worker, qd, mServer, mWorker] = await Promise.all([
    getJson('/_status'), getJson('/readyz'), getJson('/_worker/readyz'), getJson('/admin/queues/api/queues?page=1'), getText('/metrics'), getText('/_worker/metrics'),
  ]);
  if (status) last = status;
  applyStatus();
  const qOk = !!(qd && Array.isArray(qd.queues)); // a proxy/API error body is truthy but has no .queues
  const agg = qOk ? aggregateQueues(qd.queues, true) : lastGood.agg;
  if (qOk) { lastGood.queues = qd.queues; lastGood.agg = agg; }
  const sS = mServer ? parseMetrics(mServer) : lastGood.sS;
  if (mServer) lastGood.sS = sS;
  const sW = mWorker ? parseMetrics(mWorker) : lastGood.sW;
  if (mWorker) lastGood.sW = sW;
  const routes = mServer ? parseHttpRoutes(mServer) : lastGood.routes;
  if (mServer) lastGood.routes = routes;
  if (qOk || mServer || mWorker) bufferVitals(agg, sS, sW, qOk, !!mServer, !!mWorker);
  if (api) lastGood.api = api; if (worker) lastGood.worker = worker;

  renderStatusHero(computeStatus(last, agg, sS, sW), { stale: !status });
  renderOverview({ sS, sW, api: api || lastGood.api, worker: worker || lastGood.worker, apiPing: last?.api?.ms },
    { runtimeStale: !mServer && !mWorker, healthStale: !api || !worker });
  renderQueues(qOk ? qd.queues : lastGood.queues, agg, sS, worker || lastGood.worker, { stale: !qOk });
  renderRequests(routes, { stale: !mServer });
  if (mServer) { const nv = (mServer.match(/nodejs_version_info\{[^}]*version="([^"]+)"/) || [])[1]; if (nv) $('node-ver').textContent = `node ${nv}`; }

  lastPollAt = Date.now();
  $('refresh-icon').className = 'inline-flex'; $('refresh-status').textContent = relAgo();
  refreshing = false;
}
function tick() { $('clock').textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZoneName: 'short' }); }

/* ── boot ── */
$('refresh-icon').innerHTML = iconSvg('refresh'); $('refresh').onclick = () => poll();
$('status').replaceChildren(el('div', `${CARD} skel h-[52px] rounded-xl`));
(() => {
  const box = el('div', 'flex flex-wrap items-start gap-3.5');
  for (let i = 0; i < 2; i++) { const c = el('div', 'flex-1 basis-[400px]'); c.appendChild(el('div', `${CARD} skel h-[210px]`)); box.appendChild(c); }
  $('vitals').replaceChildren(box);
})();
(() => {
  const jg = el('div', 'grid grid-cols-2 gap-3.5 [grid-template-columns:repeat(auto-fit,minmax(150px,1fr))]');
  for (let i = 0; i < 4; i++) { const c = el('div', `${CARD} skel p-4`); c.appendChild(el('div', 'h-3 w-16 rounded bg-muted')); c.appendChild(el('div', 'mt-3 h-6 w-20 rounded bg-muted')); jg.appendChild(c); }
  $('queues').replaceChildren(jg);
})();

$('status').addEventListener('mouseenter', () => { cyclePaused = true; });
$('status').addEventListener('mouseleave', () => { cyclePaused = false; });
poll(); setInterval(poll, 10000);
tick(); setInterval(tick, 1000);
setInterval(cycleTick, 3200);
setInterval(freshTick, 1000);
</script>
