# core-be — Hadrian authentication configuration
#
# core-be authenticates with JWT (RS256) Bearer tokens in the Authorization header.
# Tokens are injected from environment variables — NEVER commit real tokens.
# Populate them via tooling/hadrian/.tokens.env (gitignored); see README.md for how.
#
# NOTE (v1.0.0): the active organization is carried INSIDE the JWT `org` claim, not a
# header — so cross-org tests require a token whose `org` claim targets the foreign org.
# Mint distinct tokens per (user, org) pair accordingly.

method: bearer
location: header

roles:
  super_admin:
    token: "${CORE_BE_SUPER_ADMIN_TOKEN}"
  owner:
    token: "${CORE_BE_OWNER_TOKEN}"
  admin:
    token: "${CORE_BE_ADMIN_TOKEN}"
  member:
    token: "${CORE_BE_MEMBER_TOKEN}"
  user_a:
    token: "${CORE_BE_USER_A_TOKEN}"
  user_b:
    token: "${CORE_BE_USER_B_TOKEN}"
  anonymous:
    token: ""
