sonar.projectKey=core-be
sonar.projectName=core-be
sonar.projectVersion=3.5.1-dev.0

# Source and test paths
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.spec.ts

# Exclusions — scope analysis to the deployed application surface (src/ runtime).
# Dev/CI tooling, one-off scripts, and tests run with trusted inputs (developer argv,
# local env/git output, fixtures), so security-sensitive hotspots there (OS-command
# execution, regex, "hard-coded" test credentials) are systematic false positives.
# Same rationale as the CodeQL scoping in .github/codeql/codeql-config.yml.
#
# Tests are part of the repo but not the deployed runtime, so they are excluded from
# analysis. `sonar.exclusions` only filters the MAIN file set — files classified as tests
# (via `sonar.test.inclusions` below) must ALSO be listed in `sonar.test.exclusions`,
# otherwise test-only rules keep reporting against non-deployed code: e.g. S2699 ("add an
# assertion") fires on helper-based assertions (`smokeFetch({ expectStatus })`) and S2187
# ("add some tests") fires on `describe.runIf(...)` conditionally-registered suites.
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/coverage-db-bound/**,\
  **/coverage-fast/**,\
  **/*.d.ts,\
  **/migrations/**,\
  tooling/**,\
  src/scripts/**,\
  src/tests/**,\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.spec.ts

sonar.test.exclusions=\
  src/tests/**,\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.spec.ts

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage (vitest lcov output)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# False-positive issue suppression (reviewed). secrets:S6698 on env-schema.ts flags the only
# credential-shaped literal on the deployed surface: the isLocalRuntime-gated localhost dev default
# `postgresql://core:core@localhost:5432/core`, which never runs off a developer machine.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.e1.resourceKey=**/env-schema.ts
