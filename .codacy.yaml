---
# Codacy analysis scope for core-be.
#
# Codacy's cloud analysis additionally runs JSHint, TSQLLint, and Remark-lint on
# top of the tools this repo standardises on (Biome, CodeQL security-extended,
# Semgrep, Trivy). Those three fire only on non-product surfaces, almost entirely
# as false positives:
#   - JSHint on the k6 load scripts (executed in the goja runtime, not Node)
#   - TSQLLint — a SQL Server linter — on PostgreSQL migrations and on migration
#     test fixtures that are intentionally malformed to exercise our own linter
#   - Remark-lint on generated (release-please CHANGELOG) and tooling docs
#
# We scope Codacy to the deployed application surface — the Fastify app under
# src/ (excluding src/scripts/) — mirroring the exclusions in
# .github/codeql/codeql-config.yml. Codacy does not analyse excluded paths, so
# these findings do not recur on future analyses.
#
# Paths use Java glob syntax. Codacy cannot enable/disable tools from this file
# (that is a Code patterns setting); path scoping is the supported lever here.
exclude_paths:
  - 'dist/**'
  - 'coverage/**'
  - 'coverage-db-bound/**'
  - 'coverage-fast/**'
  - 'migrations/**'
  - 'src/tests/**'
  - '**/__tests__/**'
  - 'tooling/**'
  - 'src/scripts/**'
  # Local agent worktrees and cross-tool rule/skill docs — not product code.
  - '.claude/**'
  - '.cursor/**'
  # Generated by release-please; its reference-style version links trip
  # remark-lint but must not be hand-edited.
  - 'CHANGELOG.md'
